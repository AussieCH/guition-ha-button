###############################################################################
# Guition JC3636K718C  —  Steuer-Panel für Home Assistant
# 3 Kacheln: Ventilator / Storen / Licht  (Wohnzimmer)
#   • Horizontal wischen  -> Kachel wechseln
#   • Tippen              -> schalten (Fan toggle / Storen auf-zu / Licht toggle)
#   • Knob drehen         -> Wert stellen (Drehzahl % / Position % / Helligkeit %)
#
# Pins & Display-Init stammen aus dem offiziellen Hersteller-Demo
# (JC3636K718_knob_EN) – NICHT verändern.  Erster Flash MUSS über USB erfolgen
# (16-MB-Partitionstabelle lässt sich nicht per OTA einspielen), danach geht OTA.
###############################################################################

substitutions:
  name: wohnzimmer-knob
  friendly_name: "Wohnzimmer Knob"
  timezone: "Europe/Zurich"

  # >>> HIER deine Home-Assistant-Entitäten eintragen <<<
  # Ventilator: RF -> über HA-Scripts gesteuert. Die Scripts setzen den Helfer
  #   input_number.fan_wohnzimmer_speed (0..6) -> daraus lesen wir die Ist-Stufe.
  #   Stufen-Scripts sind in act_fan_apply / act_fan_reverse hart hinterlegt.
  fan_speed_entity: "input_number.fan_wohnzimmer_speed"
  cover_entity: "cover.store_wohnzimmer_fest"
  # Drei Hue-Leuchten im Wohnzimmer (+ Sammel-Kachel steuert alle gemeinsam)
  light1_entity: "light.gradient_lightstrip_wohnzimmer"
  light2_entity: "light.lightstrip_wohnzimmer"
  light3_entity: "light.stehlampe_wohnzimmer"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - lambda: 'id(render).execute();'

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  partitions: partitions.csv      # MAX-App-Layout -> erster Flash per USB!
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO               # DEBUG/VERBOSE nur zur Diagnose (kostet LVGL-Performance)

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true       # nötig für verstecktes (nicht gebroadcastetes) WLAN
  ap:
    ssid: "${friendly_name} Setup"

# Sicherheit gegen OTA-Rollback: erst nach gut 1 Min „good" markieren (esp-idf).
safe_mode:

time:
  - platform: homeassistant
    id: ha_time
    timezone: ${timezone}

###############################################################################
# HARDWARE  (autoritativ aus dem Hersteller-Demo – nicht ändern)
###############################################################################
spi:
  id: display_qspi
  type: quad
  clk_pin: 11
  data_pins: [13, 14, 15, 16]

i2c:
  sda: 9
  scl: 10
  id: touch_bus

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Backlight"
    id: backlight_light
    restore_mode: ALWAYS_ON
  # WS2812-Ring (13 LED) auf GPIO0 (BOOT/Strapping – Strapping-Warnung ist normal).
  - platform: esp32_rmt_led_strip
    id: ring_light
    name: "${friendly_name} Ring"
    pin: GPIO0
    num_leds: 13
    rgb_order: GRB
    chipset: WS2812
    rmt_symbols: 128
    use_dma: true
    restore_mode: RESTORE_DEFAULT_OFF

touchscreen:
  platform: cst816
  id: my_touch
  interrupt_pin: GPIO7
  reset_pin: GPIO8
  display: main_display
  on_touch:
    # Startpunkt einmal merken (on_touch feuert nur beim ersten Antippen)
    - lambda: |-
        id(g_x0) = touch.x; id(g_y0) = touch.y;
        id(g_xl) = touch.x; id(g_yl) = touch.y;
  on_update:
    # Während des Wischens die aktuelle Fingerposition mitschreiben
    - lambda: |-
        if (!touches.empty()) { id(g_xl) = touches[0].x; id(g_yl) = touches[0].y; }
  on_release:
    - lambda: |-
        int dx = id(g_xl) - id(g_x0);
        int dy = id(g_yl) - id(g_y0);
        ESP_LOGD("gest", "x0=%d xl=%d dx=%d dy=%d tile=%d", id(g_x0), id(g_xl), dx, dy, id(g_tile));
        if (abs(dx) > 50 && abs(dx) > abs(dy)) {
          // Wischen -> Kachel wechseln (6 Kacheln)
          if (dx < 0) id(g_tile) = (id(g_tile) + 1) % 6;
          else        id(g_tile) = (id(g_tile) + 5) % 6;
          id(render).execute();
        } else if (abs(dx) < 25 && abs(dy) < 25) {
          // Tippen -> schalten, ABER nicht wenn auf dem Aktions-Button
          // (der hat seinen eigenen on_click). Button-Mitte ~ (180, 260), 64px.
          int t = id(g_tile);
          bool btn_shown = (t == 0 || t >= 2);
          bool on_btn = btn_shown && abs(id(g_xl) - 180) <= 40 && abs(id(g_yl) - 260) <= 40;
          if (!on_btn) id(tap_action).execute();
        }

# Knob: KEIN Quadratur-Encoder. Richtung = welcher Pin pulst.
#   links  -> GPIO2 (Wert runter)   rechts -> GPIO1 (Wert hoch)
binary_sensor:
  - platform: gpio
    name: "Knob links"
    internal: true
    pin: { number: GPIO2, inverted: true, mode: { input: true, pullup: true } }
    on_press:
      - lambda: 'id(knob_step).execute(-10);'
  - platform: gpio
    name: "Knob rechts"
    internal: true
    pin: { number: GPIO1, inverted: true, mode: { input: true, pullup: true } }
    on_press:
      - lambda: 'id(knob_step).execute(10);'

###############################################################################
# GLOBALS
###############################################################################
globals:
  # Kacheln: 0=Ventilator 1=Storen 2=Licht(alle) 3=Gradient 4=Lightstrip 5=Stehlampe
  - { id: g_tile,    type: int,  restore_value: no, initial_value: '0' }
  - { id: g_pressed, type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_x0, type: int, restore_value: no, initial_value: '0' }
  - { id: g_y0, type: int, restore_value: no, initial_value: '0' }
  - { id: g_xl, type: int, restore_value: no, initial_value: '0' }
  - { id: g_yl, type: int, restore_value: no, initial_value: '0' }
  - { id: g_fan_speed, type: int, restore_value: yes, initial_value: '0' }  # 0=Stop, 1..6 (Ist-Wert aus input_number)
  - { id: g_cover_pos,type: int,  restore_value: no, initial_value: '0' }   # 0=zu 100=offen
  # Licht: Ist-Zustand der 3 Lampen (Index 0=Gradient 1=Lightstrip 2=Stehlampe)
  - id: g_li_on
    type: bool[3]
    restore_value: no
    initial_value: '{false, false, false}'
  - id: g_li_pct
    type: int[3]
    restore_value: no
    initial_value: '{0, 0, 0}'
  - { id: g_all_pct, type: int, restore_value: no, initial_value: '50' }    # Helligkeit der Sammel-Kachel
  - { id: g_color_idx, type: int, restore_value: no, initial_value: '0' }   # aktuelles Farb-Preset
  - { id: g_set_pct, type: int, restore_value: no, initial_value: '0' }     # Scratch: Helligkeit für act_light_bri
  - { id: g_ltarget, type: std::string, restore_value: no, initial_value: '""' }  # Ziel-Entity(s) der aktiven Licht-Kachel

###############################################################################
# HA-STATE  ->  GLOBALS  (jede Änderung rendert neu)
###############################################################################
text_sensor:
  - platform: homeassistant
    id: ha_l1_state
    entity_id: ${light1_entity}
    on_value:
      - lambda: 'id(g_li_on)[0] = (x == "on"); id(render).execute();'
  - platform: homeassistant
    id: ha_l2_state
    entity_id: ${light2_entity}
    on_value:
      - lambda: 'id(g_li_on)[1] = (x == "on"); id(render).execute();'
  - platform: homeassistant
    id: ha_l3_state
    entity_id: ${light3_entity}
    on_value:
      - lambda: 'id(g_li_on)[2] = (x == "on"); id(render).execute();'

sensor:
  - platform: homeassistant
    id: ha_fan_speed
    entity_id: ${fan_speed_entity}        # Ist-Stufe 0..6 (von den RF-Scripts gesetzt)
    on_value:
      - lambda: 'id(g_fan_speed) = isnan(x) ? 0 : (int)(x + 0.5f); id(render).execute();'
  - platform: homeassistant
    id: ha_cover_pos
    entity_id: ${cover_entity}
    attribute: current_position
    on_value:
      - lambda: 'id(g_cover_pos) = isnan(x) ? 0 : (int) x; id(render).execute();'
  - platform: homeassistant
    id: ha_l1_bri
    entity_id: ${light1_entity}
    attribute: brightness          # 0..255
    on_value:
      - lambda: 'id(g_li_pct)[0] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'
  - platform: homeassistant
    id: ha_l2_bri
    entity_id: ${light2_entity}
    attribute: brightness
    on_value:
      - lambda: 'id(g_li_pct)[1] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'
  - platform: homeassistant
    id: ha_l3_bri
    entity_id: ${light3_entity}
    attribute: brightness
    on_value:
      - lambda: 'id(g_li_pct)[2] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'

###############################################################################
