###############################################################################
# SCRIPTE: render / tap_action / knob_step
###############################################################################
script:
  # --- UI neu zeichnen abhängig von g_tile + Globals ---
  - id: render
    then:
      - lambda: |-
          int t = id(g_tile);
          // Punkt-Indikator (9 Kacheln): • aktiv, · inaktiv
          std::string d;
          for (int i = 0; i < 9; i++) d += (i == t) ? "•" : "·";
          lv_label_set_text(id(w_dots), d.c_str());
          // Aktions-Button: Ventilator(0)=Umkehren, Einzel-Lampen(3..5)=Farbe.
          // "Licht alle"(2), Storen(1), Apple TV(6) haben KEINEN Mittel-Button.
          if (t == 0 || (t >= 3 && t <= 5)) {
            lv_obj_clear_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(w_btnico), (t == 0) ? "\U000F006A" : "\U000F03D8");
          } else {
            lv_obj_add_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
          }
          // Apple-TV-Kachel (6): zwei Buttons Play/Pause + Power
          if (t == 6) {
            lv_obj_clear_flag(id(w_tv_playpause), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tv_power),     LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_tv_playpause), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tv_power),     LV_OBJ_FLAG_HIDDEN);
          }
          // Storen-Kachel (1): zwei Buttons Öffnen/Schließen statt Mittel-Button
          if (t == 1) {
            lv_obj_clear_flag(id(w_cover_open), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_cover_close), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_cover_open), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_cover_close), LV_OBJ_FLAG_HIDDEN);
          }
          // System-Kachel (7): mehrzeiliges Info-Label statt großem Wert
          if (t == 7) {
            lv_obj_add_flag(id(w_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_sys), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(w_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_sys), LV_OBJ_FLAG_HIDDEN);
          }
          // Timer-Kachel (8): Info-Label + 3 Buttons
          if (t == 8) {
            lv_obj_clear_flag(id(w_tmr_info),   LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tmr_start),  LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tmr_cancel), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tmr_tone),   LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_tmr_info),   LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tmr_start),  LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tmr_cancel), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tmr_tone),   LV_OBJ_FLAG_HIDDEN);
          }
          char buf[16];
          if (t == 0) {                              // Ventilator (Stufe 0..6)
            lv_label_set_text(id(w_icon), "\U000F0210");
            lv_label_set_text(id(w_name), "Ventilator");
            lv_arc_set_range(id(w_arc), 0, 6);
            lv_arc_set_value(id(w_arc), id(g_fan_speed));
            if (id(g_fan_speed) == 0) snprintf(buf, sizeof(buf), "Stop");
            else                      snprintf(buf, sizeof(buf), "Stufe %d", id(g_fan_speed));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 1) {                       // Storen (nur auf/zu)
            lv_label_set_text(id(w_icon), "\U000F111C");
            lv_label_set_text(id(w_name), "Storen TV");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_cover_pos));
            if      (id(g_cover_pos) >= 99) snprintf(buf, sizeof(buf), "Offen");
            else if (id(g_cover_pos) <= 1)  snprintf(buf, sizeof(buf), "Zu");
            else                            snprintf(buf, sizeof(buf), "%d%%", id(g_cover_pos));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 2) {                       // Licht (alle gemeinsam)
            id(g_ltarget) = "${light1_entity},${light2_entity},${light3_entity}";
            lv_label_set_text(id(w_icon), "\U000F1253");
            lv_label_set_text(id(w_name), "Licht (alle)");
            lv_arc_set_range(id(w_arc), 0, 100);
            int sum = 0, n = 0;
            for (int k = 0; k < 3; k++) if (id(g_li_on)[k]) { sum += id(g_li_pct)[k]; n++; }
            int avg = n ? sum / n : 0;
            lv_arc_set_value(id(w_arc), avg);
            if (n) snprintf(buf, sizeof(buf), "%d%%", avg);
            else   snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe (3=Gradient 4=Lightstrip 5=Stehlampe)
            int k = t - 3;
            if      (t == 3) id(g_ltarget) = "${light1_entity}";
            else if (t == 4) id(g_ltarget) = "${light2_entity}";
            else             id(g_ltarget) = "${light3_entity}";
            lv_label_set_text(id(w_icon), (t == 5) ? "\U000F08DD" : "\U000F1051");
            lv_label_set_text(id(w_name), (t == 3) ? "Gradient" : (t == 4) ? "Lightstrip" : "Stehlampe");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_li_on)[k] ? id(g_li_pct)[k] : 0);
            if (id(g_li_on)[k]) snprintf(buf, sizeof(buf), "%d%%", id(g_li_pct)[k]);
            else                snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          } else if (t == 6) {                       // Apple TV
            lv_label_set_text(id(w_icon), "\U000F0035");   // mdi:apple
            lv_label_set_text(id(w_name), "Apple TV");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), 0);
            const char* s = (id(g_tv_state) == 1) ? "Läuft" : (id(g_tv_state) == 2) ? "Pause" : "Aus";
            lv_label_set_text(id(w_val), s);
          } else if (t == 7) {                       // System-Info
            lv_label_set_text(id(w_icon), "\U000F061A");   // mdi:chip
            lv_label_set_text(id(w_name), "System");
            // Akku-% grob aus Spannung (3.20V=0%, 4.10V=100%)
            float v = id(bat_volt).has_state() ? id(bat_volt).state : 0.0f;
            int bpct = (int)((v - 3.20f) / (4.10f - 3.20f) * 100.0f + 0.5f);
            if (bpct < 0) bpct = 0; if (bpct > 100) bpct = 100;
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), bpct);
            float freeKB = id(sys_free).has_state() ? id(sys_free).state / 1024.0f : 0.0f;
            float loopms = id(sys_loop).has_state() ? id(sys_loop).state : 0.0f;
            char sb[96];
            snprintf(sb, sizeof(sb), "RAM frei: %.0f KB\nLast: %.0f ms\nAkku: %d %%  (%.2f V)", freeKB, loopms, bpct, v);
            lv_label_set_text(id(w_sys), sb);
          } else {                                   // Timer (8)
            lv_label_set_text(id(w_icon), "\U000F13AB");   // mdi:timer
            lv_label_set_text(id(w_name), "Timer");
            lv_arc_set_range(id(w_arc), 0, 180);
            lv_arc_set_value(id(w_arc), id(g_timer_set));
            snprintf(buf, sizeof(buf), "%d min", id(g_timer_set));
            lv_label_set_text(id(w_val), buf);
            // laufende Timer zählen + frühesten Rest finden
            int cnt = 0, soon = 999999;
            for (int i = 0; i < 3; i++) if (id(g_tmr)[i] > 0) { cnt++; if (id(g_tmr)[i] < soon) soon = id(g_tmr)[i]; }
            char tb[48];
            const char* tn[] = { "Hummelflug", "Eye o.t. Tiger", "Für Elise" };
            const char* nm = tn[id(g_tone_idx)];
            if (cnt > 0) snprintf(tb, sizeof(tb), "%d aktiv  %d:%02d   %s", cnt, soon / 60, soon % 60, nm);
            else         snprintf(tb, sizeof(tb), "Ton: %s", nm);
            lv_label_set_text(id(w_tmr_info), tb);
          }

  # --- Tippen: aktive Kachel schalten ---
  - id: tap_action
    then:
      - lambda: |-
          int t = id(g_tile);
          if (t == 0) {
            // Ventilator: Tippen ohne Funktion (Stufe = Dial, Umkehren = Button)
          } else if (t == 1) {                       // Storen: Tippen inaktiv (Buttons öffnen/schließen)
            // nichts
          } else if (t == 2) {                       // Licht alle: alle an wenn aus, sonst alle aus
            bool any = id(g_li_on)[0] || id(g_li_on)[1] || id(g_li_on)[2];
            if (any) id(act_light_off).execute();    // g_ltarget = alle 3 (von render gesetzt)
            else     id(act_group_on).execute();
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe: toggeln
            id(act_light_toggle).execute();
          } else {                                   // Apple TV (6): Tippen ohne Funktion (Buttons)
            // nichts
          }

  # --- Knob: Wert der aktiven Kachel um delta ändern + an HA senden ---
  - id: knob_step
    parameters: { delta: int }
    then:
      - lambda: |-
          int t = id(g_tile);
          int step = (delta > 0) ? 1 : -1;          // Knob: 1 Detent = 1 Schritt
          if (id(g_submode) == 1) {                  // Farbmenü: Hue drehen + live anwenden
            int h = id(g_hue) + step * 10;
            while (h < 0) h += 360; while (h >= 360) h -= 360;
            id(g_hue) = h;
            id(calc_rgb).execute();
            id(act_light_hue).execute();
            id(render_color).execute();
            return;
          }
          if (t == 0) {                              // Ventilator: ~4 Klicks pro Stufe (Rad 32 Klicks/360°, Bogen ~300°)
            int K = ${fan_clicks_per_stage};
            id(g_fan_clicks) += step;
            if (id(g_fan_clicks) >= K) {
              id(g_fan_clicks) = 0;
              if (id(g_fan_speed) < 6) { id(g_fan_speed)++; id(act_fan_apply).execute(); }
            } else if (id(g_fan_clicks) <= -K) {
              id(g_fan_clicks) = 0;
              if (id(g_fan_speed) > 0) { id(g_fan_speed)--; id(act_fan_apply).execute(); }
            }
          } else if (t == 1) {                       // Storen: Knob inaktiv (Buttons öffnen/schließen)
            // nichts
          } else if (t == 2) {                       // Licht alle: relativ ±5 %, je Lampe ab Ist-Wert
            for (int k = 0; k < 3; k++) {
              if (!id(g_li_on)[k]) continue;         // ausgeschaltete Lampen bleiben aus
              int v = id(g_li_pct)[k] + step * 5; if (v < 0) v = 0; if (v > 100) v = 100;
              id(g_li_pct)[k] = v;
            }
            id(act_group_dim).execute();
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe: ±5 % Helligkeit
            int k = t - 3;
            int v = id(g_li_pct)[k] + step * 5; if (v < 0) v = 0; if (v > 100) v = 100;
            id(g_li_pct)[k] = v; id(g_set_pct) = v;
            id(act_light_on).execute();
          } else if (t == 6) {                       // Apple TV: Lautstärke
            if (step > 0) id(act_tv_volup).execute();
            else          id(act_tv_voldn).execute();
          } else if (t == 7) {                       // System-Info: Knob ohne Funktion
            // nichts
          } else {                                   // Timer (8): Minuten einstellen 0..180
            int v = id(g_timer_set) + step * ${timer_min_per_click};
            if (v < 0) v = 0; if (v > 180) v = 180;
            id(g_timer_set) = v;
          }
      - lambda: 'id(render).execute();'

  # --- HA-Service-Wrapper (eigene Scripts, damit Lambdas sie aufrufen können) ---
  # Ventilator (RF): aktuelle Stufe -> passendes HA-Script auslösen
  - id: act_fan_apply
    then:
      - homeassistant.action:
          action: script.turn_on
          data:
            entity_id: !lambda |-
              switch (id(g_fan_speed)) {
                case 1: return "script.ventilator_wohnzimmer_speed_1_t";
                case 2: return "script.ventilator_wohnzimmer_speed_2";
                case 3: return "script.ventilator_wohnzimmer_speed_3";
                case 4: return "script.ventilator_wohnzimmer_speed_3_duplizieren";
                case 5: return "script.ventilator_wohnzimmer_speed_5";
                case 6: return "script.ventilator_wohnzimmer_speed_6";
                default: return "script.ventilator_wohnzimmer_stop";   // 0 = Stop
              }
  - id: act_fan_reverse
    then:
      - homeassistant.action:
          action: script.turn_on
          data: { entity_id: "script.ventilator_wohnzimmer_umkehren" }
  - id: act_cover_open
    then:
      - homeassistant.action: { action: cover.open_cover, data: { entity_id: "${cover_entity}" } }
  - id: act_cover_close
    then:
      - homeassistant.action: { action: cover.close_cover, data: { entity_id: "${cover_entity}" } }
  # Licht: alle Actions zielen auf g_ltarget (eine Lampe oder die 3 als Komma-Liste).
  # g_ltarget wird im render-Script je aktiver Kachel gesetzt.
  - id: act_light_toggle
    then:
      - homeassistant.action:
          action: light.toggle
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  - id: act_light_on            # einschalten / dimmen auf g_set_pct
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            brightness_pct: !lambda 'return id(g_set_pct);'
  - id: act_light_off
    then:
      - homeassistant.action:
          action: light.turn_off
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  # --- Licht alle (Master) ---
  # Pro-Lampe-Helligkeit (eigene Entity + eigener g_li_pct, keine geteilten Variablen)
  - id: act_l1_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light1_entity}", brightness_pct: !lambda 'return id(g_li_pct)[0];' }
  - id: act_l2_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light2_entity}", brightness_pct: !lambda 'return id(g_li_pct)[1];' }
  - id: act_l3_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light3_entity}", brightness_pct: !lambda 'return id(g_li_pct)[2];' }
  # Relatives Dimmen: nur eingeschaltete Lampen auf ihren neuen g_li_pct setzen
  - id: act_group_dim
    then:
      - if: { condition: { lambda: 'return id(g_li_on)[0];' }, then: [ script.execute: act_l1_bri ] }
      - if: { condition: { lambda: 'return id(g_li_on)[1];' }, then: [ script.execute: act_l2_bri ] }
      - if: { condition: { lambda: 'return id(g_li_on)[2];' }, then: [ script.execute: act_l3_bri ] }
  # Alle drei einschalten (ohne Helligkeit -> jede Lampe kehrt zu ihrem letzten Wert zurück)
  - id: act_group_on
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: !lambda 'return id(g_ltarget);' }

  # --- Apple TV ---
  - id: act_tv_playpause      # ein Button: toggelt Play/Pause
    then:
      - homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: "${tv_media_entity}" } }
  - id: act_tv_power          # Apple TV schlafen/aufwecken via remote.send_command
    then:                     #  g_tv_state==0 => Aus => wakeup, sonst suspend. Optimistisch sofort umschalten.
      - if:
          condition: { lambda: 'return id(g_tv_state) != 0;' }
          then:
            - homeassistant.action: { action: remote.send_command, data: { entity_id: "${tv_remote_entity}", command: "suspend" } }
            - lambda: 'id(g_tv_state) = 0; id(render).execute();'
          else:
            - homeassistant.action: { action: remote.send_command, data: { entity_id: "${tv_remote_entity}", command: "wakeup" } }
            - lambda: 'id(g_tv_state) = 2; id(render).execute();'
  - id: act_tv_volup
    then:
      - homeassistant.action: { action: media_player.volume_up, data: { entity_id: "${tv_media_entity}" } }
  - id: act_tv_voldn
    then:
      - homeassistant.action: { action: media_player.volume_down, data: { entity_id: "${tv_media_entity}" } }

  # --- Display-Sleep ---
  - id: idle_timer            # nach 60s ohne Interaktion Backlight aus
    mode: restart
    then:
      - delay: 60s
      - lambda: 'id(g_disp_off) = true;'
      - light.turn_off: backlight_light
  - id: wake_display          # Backlight an + Timer neu starten
    then:
      - lambda: 'id(g_disp_off) = false;'
      - light.turn_on: backlight_light
      - script.execute: idle_timer

  # --- Timer ---
  - id: start_timer           # neuen Timer mit g_timer_set Minuten in freiem Slot starten
    then:
      - lambda: |-
          if (id(g_timer_set) <= 0) return;
          for (int i = 0; i < 3; i++) {
            if (id(g_tmr)[i] == 0) { id(g_tmr)[i] = id(g_timer_set) * 60; break; }
          }
      - script.execute: render
  - id: cancel_all            # alle Timer abbrechen + Alarm/Ton/Ring stoppen
    then:
      - lambda: 'for (int i = 0; i < 3; i++) id(g_tmr)[i] = 0; id(g_alarm) = false;'
      - rtttl.stop:
      - light.turn_off: ring_light
      - script.execute: render
  - id: dismiss_alarm         # Alarm quittieren (Tippen aufs Display): Ton + Blinken aus
    then:
      - lambda: 'id(g_alarm) = false;'
      - rtttl.stop:
      - light.turn_off: ring_light
  - id: tone_cycle            # Tonfolge weiterschalten + Vorschau abspielen
    then:
      - lambda: 'id(g_tone_idx) = (id(g_tone_idx) + 1) % 3;'
      - script.execute: play_tone
      - script.execute: render
  - id: play_tone             # gewählte Tonfolge über den Speaker spielen
    then:
      - rtttl.play: !lambda |-
          switch (id(g_tone_idx)) {
            case 0:  // Flight of the Bumblebee
              return "bumblebee:d=16,o=5,b=160:e6,d#6,d6,c#6,c6,b,a#,a,g#,g,f#,f,e,d#,d,c#,c,b4,a#4,a4,g#4,a4,a#4,b4,c,c#,d,d#,e,f,f#,g,g#,a,a#,b,c6,c#6,d6,d#6";
            case 1:  // Eye of the Tiger
              return "tiger:d=8,o=5,b=109:c,c,d#,c,p,c,d#,c,p,c,d#,c,a#4,p,c,c,d#,c,p,c,d#,c,p,c,d#,f,d#,c";
            default: // Für Elise
              return "elise:d=8,o=5,b=125:e6,d#6,e6,d#6,e6,b,d6,c6,a,p,c,e,a,b,p,e,g#,b,c6,p,e,e6,d#6,e6,d#6,e6,b,d6,c6,a,p,c,e,a,b,p,e,c6,b,a";
          }
  - id: act_light_color         # aktuelles Preset auf g_ltarget anwenden (schaltet auch ein)
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            color_name: !lambda |-
              switch (id(g_color_idx)) {
                case 0: return "bisque";           // Warmweiß
                case 1: return "darkorange";
                case 2: return "cornflowerblue";
                case 3: return "mediumpurple";
                case 4: return "orchid";
                default: return "tomato";          // 5
              }

  # Aktions-Button-Dispatcher: Ventilator -> Umkehren, Licht -> Farbmenü öffnen
  - id: act_button
    then:
      - lambda: |-
          int t = id(g_tile);
          if (t == 0) {
            id(act_fan_reverse).execute();
          } else if (t >= 3 && t <= 5) {
            id(enter_color).execute();      // Paletten-Icon = Farbmenü (nur Einzel-Lampen)
          }

  # --- Farbmenü ---
  # Hue (0..359) -> RGB (S=V=1) in g_cr/g_cg/g_cb
  - id: calc_rgb
    then:
      - lambda: |-
          float hh = id(g_hue) / 60.0f;
          int i = ((int) hh) % 6; if (i < 0) i += 6;
          float f = hh - (int) hh;
          float r = 0, g = 0, b = 0;
          switch (i) {
            case 0: r = 1;     g = f;     b = 0;     break;
            case 1: r = 1 - f; g = 1;     b = 0;     break;
            case 2: r = 0;     g = 1;     b = f;     break;
            case 3: r = 0;     g = 1 - f; b = 1;     break;
            case 4: r = f;     g = 0;     b = 1;     break;
            default: r = 1;    g = 0;     b = 1 - f; break;
          }
          id(g_cr) = (int)(r * 255); id(g_cg) = (int)(g * 255); id(g_cb) = (int)(b * 255);
  # Farbmenü-Seite zeichnen (Titel + Vorschau-Kreis)
  - id: render_color
    then:
      - lambda: |-
          int t = id(g_tile);
          lv_label_set_text(id(w_col_title),
            (t == 2) ? "Licht (alle)" : (t == 3) ? "Gradient" : (t == 4) ? "Lightstrip" : (t == 5) ? "Stehlampe" : "Farbe");
          uint32_t col = ((uint32_t) id(g_cr) << 16) | ((uint32_t) id(g_cg) << 8) | (uint32_t) id(g_cb);
          lv_obj_set_style_bg_color(id(w_col_prev), lv_color_hex(col), LV_PART_MAIN);
          lv_obj_invalidate(id(w_col_prev));
  - id: enter_color
    then:
      - lambda: 'id(g_submode) = 1; id(calc_rgb).execute(); id(render_color).execute();'
      - lvgl.page.show: page_color
  - id: exit_color
    then:
      - lambda: 'id(g_submode) = 0;'
      - lvgl.page.show: page_main
      - lambda: 'id(render).execute();'
  # Farbe an HA senden (rgb_color aus g_cr/g_cg/g_cb; schaltet auch ein)
  - id: act_light_hue
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
          variables:
            r: !lambda 'return id(g_cr);'
            g: !lambda 'return id(g_cg);'
            b: !lambda 'return id(g_cb);'
          data_template:
            rgb_color: "{{ [r, g, b] }}"
