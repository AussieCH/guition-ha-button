###############################################################################
# FONTS
###############################################################################
font:
  - file: "gfonts://Roboto"
    id: font_name
    size: 30
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_val
    size: 52
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_dots
    size: 22
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  # Material-Design-Icons (TTF wird beim Kompilieren geladen -> Build-Host braucht Internet)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 72
    bpp: 4
    glyphs:
      - "\U000F0210"   # mdi:fan
      - "\U000F111C"   # mdi:window-shutter
      - "\U000F1253"   # mdi:lightbulb-group (Sammel-Kachel)
      - "\U000F1051"   # mdi:led-strip-variant (Gradient/Lightstrip)
      - "\U000F08DD"   # mdi:floor-lamp (Stehlampe)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_sm
    size: 40
    bpp: 4
    glyphs:
      - "\U000F006A"   # mdi:autorenew (Drehrichtung umkehren)
      - "\U000F03D8"   # mdi:palette (Farb-Preset wechseln)

###############################################################################
# LVGL  (eine Seite; alle Werte werden vom render-Script gesetzt)
###############################################################################
lvgl:
  buffer_size: 24%            # Draw-Buffer in schnelles internes RAM (nicht PSRAM)
  displays: [main_display]
  touchscreens: [my_touch]
  bg_color: 0x000000
  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        - arc:
            id: w_arc
            align: CENTER
            width: 320
            height: 320
            arc_width: 14
            min_value: 0
            max_value: 100
            value: 0
            adjustable: false
            arc_color: 0x202020
            indicator: { arc_color: 0x3DA9FC, arc_width: 14 }
            knob: { bg_opa: TRANSP }
        - label:
            id: w_icon
            align: CENTER
            y: -92
            text_font: font_icon
            text_color: 0xFFFFFF
            text: "\U000F0210"
        - label:
            id: w_name
            align: CENTER
            y: -44
            text_font: font_name
            text_color: 0xFFFFFF
            text: "Ventilator"
        - label:
            id: w_val
            align: CENTER
            y: 6
            text_font: font_val
            text_color: 0x3DA9FC
            text: "--"
        # Aktions-Button: Ventilator -> Umkehren, Licht -> Farb-Preset.
        # Auf Storen versteckt. Icon + Funktion setzt das render-Script.
        - button:
            id: w_btn
            align: CENTER
            y: 80
            width: 64
            height: 64
            radius: 32
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            widgets:
              - label:
                  id: w_btnico
                  align: CENTER
                  text_font: font_icon_sm
                  text_color: 0x3DA9FC
                  text: "\U000F006A"
            on_click:
              - lambda: 'id(act_button).execute();'
        - label:
            id: w_dots
            align: CENTER
            y: 148
            text_font: font_dots
            text_color: 0x888888
            text: "•·····"

###############################################################################
# SCRIPTE: render / tap_action / knob_step
###############################################################################
script:
  # --- UI neu zeichnen abhängig von g_tile + Globals ---
  - id: render
    then:
      - lambda: |-
          int t = id(g_tile);
          // Punkt-Indikator (6 Kacheln): • aktiv, · inaktiv
          std::string d;
          for (int i = 0; i < 6; i++) d += (i == t) ? "•" : "·";
          lv_label_set_text(id(w_dots), d.c_str());
          // Aktions-Button: Ventilator(0)=Umkehren, Licht(2..5)=Farbe, Storen(1)=aus
          if (t == 0 || t >= 2) {
            lv_obj_clear_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(w_btnico), (t == 0) ? "\U000F006A" : "\U000F03D8");
          } else {
            lv_obj_add_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
          }
          char buf[16];
          if (t == 0) {                              // Ventilator (Stufe 0..6)
            lv_label_set_text(id(w_icon), "\U000F0210");
            lv_label_set_text(id(w_name), "Ventilator");
            lv_arc_set_range(id(w_arc), 0, 6);
            lv_arc_set_value(id(w_arc), id(g_fan_speed));
            if (id(g_fan_speed) == 0) snprintf(buf, sizeof(buf), "Stop");
            else                      snprintf(buf, sizeof(buf), "Stufe %d", id(g_fan_speed));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 1) {                       // Storen (nur auf/zu)
            lv_label_set_text(id(w_icon), "\U000F111C");
            lv_label_set_text(id(w_name), "Storen");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_cover_pos));
            if      (id(g_cover_pos) >= 99) snprintf(buf, sizeof(buf), "Offen");
            else if (id(g_cover_pos) <= 1)  snprintf(buf, sizeof(buf), "Zu");
            else                            snprintf(buf, sizeof(buf), "%d%%", id(g_cover_pos));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 2) {                       // Licht (alle gemeinsam)
            id(g_ltarget) = "${light1_entity},${light2_entity},${light3_entity}";
            lv_label_set_text(id(w_icon), "\U000F1253");
            lv_label_set_text(id(w_name), "Licht (alle)");
            lv_arc_set_range(id(w_arc), 0, 100);
            bool any = id(g_li_on)[0] || id(g_li_on)[1] || id(g_li_on)[2];
            lv_arc_set_value(id(w_arc), any ? id(g_all_pct) : 0);
            if (any) snprintf(buf, sizeof(buf), "%d%%", id(g_all_pct));
            else     snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          } else {                                   // Einzel-Lampe (3=Gradient 4=Lightstrip 5=Stehlampe)
            int k = t - 3;
            if      (t == 3) id(g_ltarget) = "${light1_entity}";
            else if (t == 4) id(g_ltarget) = "${light2_entity}";
            else             id(g_ltarget) = "${light3_entity}";
            lv_label_set_text(id(w_icon), (t == 5) ? "\U000F08DD" : "\U000F1051");
            lv_label_set_text(id(w_name), (t == 3) ? "Gradient" : (t == 4) ? "Lightstrip" : "Stehlampe");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_li_on)[k] ? id(g_li_pct)[k] : 0);
            if (id(g_li_on)[k]) snprintf(buf, sizeof(buf), "%d%%", id(g_li_pct)[k]);
            else                snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          }

  # --- Tippen: aktive Kachel schalten ---
  - id: tap_action
    then:
      - lambda: |-
          int t = id(g_tile);
          if (t == 0) {
            // Ventilator: Tippen ohne Funktion (Stufe = Dial, Umkehren = Button)
          } else if (t == 1) {                       // Storen: auf/zu toggeln
            if (id(g_cover_pos) > 50) id(act_cover_close).execute();
            else                      id(act_cover_open).execute();
          } else if (t == 2) {                       // Licht alle: an wenn aus, sonst aus
            bool any = id(g_li_on)[0] || id(g_li_on)[1] || id(g_li_on)[2];
            if (any) { id(act_light_off).execute(); }
            else     { id(g_set_pct) = id(g_all_pct); id(act_light_on).execute(); }
          } else {                                   // Einzel-Lampe: toggeln
            id(act_light_toggle).execute();
          }

  # --- Knob: Wert der aktiven Kachel um delta ändern + an HA senden ---
  - id: knob_step
    parameters: { delta: int }
    then:
      - lambda: |-
          int t = id(g_tile);
          int step = (delta > 0) ? 1 : -1;          // Knob: 1 Detent = 1 Schritt
          ESP_LOGD("knob", "step delta=%d tile=%d fan=%d", delta, t, id(g_fan_speed));
          if (t == 0) {                              // Ventilator: ±1 Stufe (0..6)
            int v = id(g_fan_speed) + step; if (v < 0) v = 0; if (v > 6) v = 6;
            if (v != id(g_fan_speed)) { id(g_fan_speed) = v; id(act_fan_apply).execute(); }
          } else if (t == 1) {                       // Storen: Dial = auf / zu
            if (step > 0) id(act_cover_open).execute();
            else          id(act_cover_close).execute();
          } else if (t == 2) {                       // Licht alle: ±10 % Helligkeit
            int v = id(g_all_pct) + step * 10; if (v < 0) v = 0; if (v > 100) v = 100;
            id(g_all_pct) = v; id(g_set_pct) = v;
            id(act_light_on).execute();
          } else {                                   // Einzel-Lampe: ±10 % Helligkeit
            int k = t - 3;
            int v = id(g_li_pct)[k] + step * 10; if (v < 0) v = 0; if (v > 100) v = 100;
            id(g_li_pct)[k] = v; id(g_set_pct) = v;
            id(act_light_on).execute();
          }
      - lambda: 'id(render).execute();'

  # --- HA-Service-Wrapper (eigene Scripts, damit Lambdas sie aufrufen können) ---
  # Ventilator (RF): aktuelle Stufe -> passendes HA-Script auslösen
  - id: act_fan_apply
    then:
      - homeassistant.action:
          action: script.turn_on
          data:
            entity_id: !lambda |-
              switch (id(g_fan_speed)) {
                case 1: return "script.ventilator_wohnzimmer_speed_1_t";
                case 2: return "script.ventilator_wohnzimmer_speed_2";
                case 3: return "script.ventilator_wohnzimmer_speed_3";
                case 4: return "script.ventilator_wohnzimmer_speed_3_duplizieren";
                case 5: return "script.ventilator_wohnzimmer_speed_5";
                case 6: return "script.ventilator_wohnzimmer_speed_6";
                default: return "script.ventilator_wohnzimmer_stop";   // 0 = Stop
              }
  - id: act_fan_reverse
    then:
      - homeassistant.action:
          action: script.turn_on
          data: { entity_id: "script.ventilator_wohnzimmer_umkehren" }
  - id: act_cover_open
    then:
      - homeassistant.action: { action: cover.open_cover, data: { entity_id: "${cover_entity}" } }
  - id: act_cover_close
    then:
      - homeassistant.action: { action: cover.close_cover, data: { entity_id: "${cover_entity}" } }
  # Licht: alle Actions zielen auf g_ltarget (eine Lampe oder die 3 als Komma-Liste).
  # g_ltarget wird im render-Script je aktiver Kachel gesetzt.
  - id: act_light_toggle
    then:
      - homeassistant.action:
          action: light.toggle
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  - id: act_light_on            # einschalten / dimmen auf g_set_pct
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            brightness_pct: !lambda 'return id(g_set_pct);'
  - id: act_light_off
    then:
      - homeassistant.action:
          action: light.turn_off
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  - id: act_light_color         # aktuelles Preset auf g_ltarget anwenden (schaltet auch ein)
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            color_name: !lambda |-
              switch (id(g_color_idx)) {
                case 0: return "bisque";           // Warmweiß
                case 1: return "darkorange";
                case 2: return "cornflowerblue";
                case 3: return "mediumpurple";
                case 4: return "orchid";
                default: return "tomato";          // 5
              }

  # Aktions-Button-Dispatcher: Ventilator -> Umkehren, Licht -> nächstes Farb-Preset
  - id: act_button
    then:
      - lambda: |-
          int t = id(g_tile);
          if (t == 0) {
            id(act_fan_reverse).execute();
          } else if (t >= 2) {
            id(g_color_idx) = (id(g_color_idx) + 1) % 6;
            id(act_light_color).execute();
          }
