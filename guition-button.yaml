###############################################################################
# FONTS
###############################################################################
font:
  - file: "gfonts://Roboto"
    id: font_name
    size: 30
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_val
    size: 52
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_dots
    size: 22
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_sys
    size: 26
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  # Material-Design-Icons (TTF wird beim Kompilieren geladen -> Build-Host braucht Internet)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 72
    bpp: 4
    glyphs:
      - "\U000F0210"   # mdi:fan
      - "\U000F111C"   # mdi:window-shutter
      - "\U000F1253"   # mdi:lightbulb-group (Sammel-Kachel)
      - "\U000F1051"   # mdi:led-strip-variant (Gradient/Lightstrip)
      - "\U000F08DD"   # mdi:floor-lamp (Stehlampe)
      - "\U000F0035"   # mdi:apple (Apple TV)
      - "\U000F061A"   # mdi:chip (System-Info)
      - "\U000F13AB"   # mdi:timer (Timer)
      - "\U000F0079"   # mdi:battery (Akku)
      - "\U000F0085"   # mdi:battery-charging-100 (lädt)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_sm
    size: 40
    bpp: 4
    glyphs:
      - "\U000F006A"   # mdi:autorenew (Drehrichtung umkehren)
      - "\U000F03D8"   # mdi:palette (Farb-Preset wechseln)
      - "\U000F0737"   # mdi:arrow-up-bold (Storen öffnen)
      - "\U000F072E"   # mdi:arrow-down-bold (Storen schließen)
      - "\U000F040E"   # mdi:play-pause (Apple TV Toggle)
      - "\U000F0425"   # mdi:power (Apple TV an/aus)
      - "\U000F040A"   # mdi:play (Timer Start)
      - "\U000F04DB"   # mdi:stop (Timer abbrechen)
      - "\U000F0387"   # mdi:music-note (Ton wählen)
      - "\U000F0156"   # mdi:close (einzelnen Timer abbrechen)
      - "\U000F0415"   # mdi:plus (neuen Timer hinzufügen)
      - "\U000F012C"   # mdi:check (neuen Timer bestätigen/starten)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_plane
    size: 22
    bpp: 4
    glyphs:
      - "\U000F001D"   # mdi:airplane (Flugradar-Marker)
  - file: "gfonts://Roboto"
    id: font_small
    size: 14
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true

image:
  - file: assets/airplane.png      # zeigt nach Norden; wird je Kurs rotiert
    id: img_plane
    type: RGB
    transparency: alpha_channel

###############################################################################
# LVGL  (eine Seite; alle Werte werden vom render-Script gesetzt)
###############################################################################
lvgl:
  buffer_size: 24%            # Draw-Buffer in schnelles internes RAM (nicht PSRAM)
  displays: [main_display]
  touchscreens: [my_touch]
  bg_color: 0x000000
  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        - arc:
            id: w_arc
            align: CENTER
            width: 320
            height: 320
            arc_width: 14
            min_value: 0
            max_value: 100
            value: 0
            adjustable: false
            arc_color: 0x202020
            indicator: { arc_color: 0x3DA9FC, arc_width: 14 }
            knob: { bg_opa: TRANSP }
        - label:
            id: w_icon
            align: CENTER
            y: -92
            text_font: font_icon
            text_color: 0xFFFFFF
            text: "\U000F0210"
        - label:
            id: w_name
            align: CENTER
            y: -44
            text_font: font_name
            text_color: 0xFFFFFF
            text: "Ventilator"
        - label:
            id: w_val
            align: CENTER
            y: 6
            text_font: font_val
            text_color: 0x3DA9FC
            text: "--"
        # Mehrzeilige System-Info (nur auf Kachel 7 sichtbar, sonst versteckt)
        - label:
            id: w_sys
            align: CENTER
            y: 16
            text_align: CENTER
            text_font: font_dots
            text_color: 0xFFFFFF
            hidden: true
            text: ""
        # Aktions-Button: Ventilator -> Umkehren, Licht -> Farb-Preset.
        # Auf Storen versteckt. Icon + Funktion setzt das render-Script.
        - button:
            id: w_btn
            align: CENTER
            y: 80
            width: 64
            height: 64
            radius: 32
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            widgets:
              - label:
                  id: w_btnico
                  align: CENTER
                  text_font: font_icon_sm
                  text_color: 0x3DA9FC
                  text: "\U000F006A"
            on_click:
              - lambda: 'id(act_button).execute();'
        # Storen-Buttons (nur auf der Storen-Kachel sichtbar): Öffnen / Schließen
        - button:
            id: w_cover_open
            align: CENTER
            x: -58
            y: 80
            width: 72
            height: 64
            radius: 18
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            hidden: true
            widgets:
              - label:
                  align: CENTER
                  text_font: font_icon_sm
                  text_color: 0x3DA9FC
                  text: "\U000F0737"
            on_click:
              - lambda: 'id(act_cover_open).execute();'
        - button:
            id: w_cover_close
            align: CENTER
            x: 58
            y: 80
            width: 72
            height: 64
            radius: 18
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            hidden: true
            widgets:
              - label:
                  align: CENTER
                  text_font: font_icon_sm
                  text_color: 0x3DA9FC
                  text: "\U000F072E"
            on_click:
              - lambda: 'id(act_cover_close).execute();'
        # Apple-TV-Buttons (nur auf Kachel 6): Play/Pause + Power
        - button:
            id: w_tv_playpause
            align: CENTER
            x: -55
            y: 80
            width: 72
            height: 64
            radius: 18
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            hidden: true
            widgets:
              - label: { align: CENTER, text_font: font_icon_sm, text_color: 0x3DA9FC, text: "\U000F040E" }
            on_click:
              - lambda: 'id(act_tv_playpause).execute();'
        - button:
            id: w_tv_power
            align: CENTER
            x: 55
            y: 80
            width: 72
            height: 64
            radius: 18
            bg_color: 0x2A1A1A
            border_width: 2
            border_color: 0xC0504D
            hidden: true
            widgets:
              - label: { align: CENTER, text_font: font_icon_sm, text_color: 0xC0504D, text: "\U000F0425" }
            on_click:
              - lambda: 'id(act_tv_power).execute();'
        # Timer-Info (laufende Timer + gewählter Ton), nur auf Kachel 8
        - label:
            id: w_tmr_info
            align: CENTER
            y: 44
            text_align: CENTER
            text_font: font_dots
            text_color: 0xBBBBBB
            hidden: true
            text: ""
        # Timer-Buttons (nur auf Kachel 8): + (Timer hinzufügen) / Ton.
        # Stoppen einzelner Timer = Swipe up (Liste). Kein Alle-Stop-Button mehr.
        - button:
            id: w_tmr_start
            align: CENTER
            x: -55
            y: 86
            width: 72
            height: 64
            radius: 18
            bg_color: 0x16241A
            border_width: 2
            border_color: 0x49C56B
            hidden: true
            widgets:
              - label: { id: w_tmr_addico, align: CENTER, text_font: font_icon_sm, text_color: 0x49C56B, text: "\U000F0415" }
            on_click:
              - lambda: 'id(timer_plus).execute();'
        - button:
            id: w_tmr_tone
            align: CENTER
            x: 55
            y: 86
            width: 72
            height: 64
            radius: 18
            bg_color: 0x1A2230
            border_width: 2
            border_color: 0x3DA9FC
            hidden: true
            widgets:
              - label: { align: CENTER, text_font: font_icon_sm, text_color: 0x3DA9FC, text: "\U000F0387" }
            on_click:
              - lambda: 'id(tone_cycle).execute();'
        - label:
            id: w_dots
            align: CENTER
            y: 148
            text_font: font_dots
            text_color: 0x888888
            text: "•·········"
    # Farbmenü-Seite (Swipe runter auf Licht-Kacheln öffnet sie, Swipe hoch zurück)
    - id: page_color
      bg_color: 0x000000
      widgets:
        - label:
            id: w_col_title
            align: TOP_MID
            y: 46
            text_font: font_name
            text_color: 0xFFFFFF
            text: "Farbe"
        - obj:
            id: w_col_prev
            align: CENTER
            width: 168
            height: 168
            radius: 84
            bg_color: 0xFF0000
            border_width: 4
            border_color: 0xFFFFFF
    # Aktive-Timer-Liste (Swipe up öffnet sie, Swipe down zurück)
    - id: page_timers
      bg_color: 0x000000
      widgets:
        - label: { id: w_tl_title, align: TOP_MID, y: 18, text_font: font_dots, text_color: 0xFFFFFF, text: "Aktive Timer" }
        # 5 Zeilen (Farben: rot, orange, gelb, grün, blau)
        - label: { id: w_tl0, align: CENTER, x: -24, y: -82, text_font: font_dots, text_color: 0xFF6B6B, hidden: true, text: "" }
        - button:
            id: w_tc0
            align: CENTER
            x: 132
            y: -82
            width: 52
            height: 38
            radius: 12
            bg_color: 0x2A1A1A
            border_width: 2
            border_color: 0xFF6B6B
            hidden: true
            widgets:
              - label: { align: CENTER, text_font: font_icon_sm, text_color: 0xFF6B6B, text: "\U000F0156" }
            on_click:
              - lambda: 'id(cancel_one).execute(0);'
        - label: { id: w_tl1, align: CENTER, x: -24, y: -41, text_font: font_dots, text_color: 0xFFA64D, hidden: true, text: "" }
        - button:
