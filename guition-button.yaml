###############################################################################
script:
  # --- UI neu zeichnen abhängig von g_tile + Globals ---
  - id: render
    then:
      - lambda: |-
          const int order[10] = ${tile_order};
          int pos = id(g_tile);                      // Carousel-Position
          int t = order[pos];                        // Tile-Typ an dieser Position
          // Punkt-Indikator (9 Kacheln): • = aktuelle Position
          std::string d;
          for (int i = 0; i < 10; i++) d += (i == pos) ? "•" : "·";
          lv_label_set_text(id(w_dots), d.c_str());
          // Arc-Farbe standardmäßig blau, Icon weiß (Timer-Kachel überschreibt beides je Timer-Farbe)
          lv_obj_set_style_arc_color(id(w_arc), lv_color_hex(0x3DA9FC), LV_PART_INDICATOR);
          lv_obj_set_style_text_color(id(w_icon), lv_color_hex(0xFFFFFF), LV_PART_MAIN);
          // Aktions-Button: Ventilator(0)=Umkehren, Einzel-Lampen(3..5)=Farbe.
          // "Licht alle"(2), Storen(1), Apple TV(6) haben KEINEN Mittel-Button.
          if (t == 0 || (t >= 3 && t <= 5)) {
            lv_obj_clear_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
            lv_label_set_text(id(w_btnico), (t == 0) ? "\U000F006A" : "\U000F03D8");
          } else {
            lv_obj_add_flag(id(w_btn), LV_OBJ_FLAG_HIDDEN);
          }
          // Apple-TV-Kachel (6): zwei Buttons Play/Pause + Power
          if (t == 6) {
            lv_obj_clear_flag(id(w_tv_playpause), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tv_power),     LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_tv_playpause), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tv_power),     LV_OBJ_FLAG_HIDDEN);
          }
          // Storen-Kachel (1): zwei Buttons Öffnen/Schließen statt Mittel-Button
          if (t == 1) {
            lv_obj_clear_flag(id(w_cover_open), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_cover_close), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_cover_open), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_cover_close), LV_OBJ_FLAG_HIDDEN);
          }
          // System-Kachel (7): mehrzeiliges Info-Label statt großem Wert
          if (t == 7) {
            lv_obj_add_flag(id(w_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_sys), LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_clear_flag(id(w_val), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_sys), LV_OBJ_FLAG_HIDDEN);
          }
          // Timer-Kachel (8): Info-Label + 3 Buttons
          if (t == 8) {
            lv_obj_clear_flag(id(w_tmr_info),  LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tmr_start), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(w_tmr_tone),  LV_OBJ_FLAG_HIDDEN);
          } else {
            lv_obj_add_flag(id(w_tmr_info),  LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tmr_start), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(w_tmr_tone),  LV_OBJ_FLAG_HIDDEN);
          }
          char buf[16];
          if (t == 0) {                              // Ventilator (Stufe 0..6)
            lv_label_set_text(id(w_icon), "\U000F0210");
            lv_label_set_text(id(w_name), "Ventilator");
            lv_arc_set_range(id(w_arc), 0, 6);
            lv_arc_set_value(id(w_arc), id(g_fan_speed));
            if (id(g_fan_speed) == 0) snprintf(buf, sizeof(buf), "Stop");
            else                      snprintf(buf, sizeof(buf), "Stufe %d", id(g_fan_speed));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 1) {                       // Storen (nur auf/zu)
            lv_label_set_text(id(w_icon), "\U000F111C");
            lv_label_set_text(id(w_name), "Storen TV");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_cover_pos));
            if      (id(g_cover_pos) >= 99) snprintf(buf, sizeof(buf), "Offen");
            else if (id(g_cover_pos) <= 1)  snprintf(buf, sizeof(buf), "Zu");
            else                            snprintf(buf, sizeof(buf), "%d%%", id(g_cover_pos));
            lv_label_set_text(id(w_val), buf);
          } else if (t == 2) {                       // Licht (alle gemeinsam)
            id(g_ltarget) = "${light1_entity},${light2_entity},${light3_entity}";
            lv_label_set_text(id(w_icon), "\U000F1253");
            lv_label_set_text(id(w_name), "Licht (alle)");
            lv_arc_set_range(id(w_arc), 0, 100);
            int sum = 0, n = 0;
            for (int k = 0; k < 3; k++) if (id(g_li_on)[k]) { sum += id(g_li_pct)[k]; n++; }
            int avg = n ? sum / n : 0;
            lv_arc_set_value(id(w_arc), avg);
            if (n) snprintf(buf, sizeof(buf), "%d%%", avg);
            else   snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe (3=Gradient 4=Lightstrip 5=Stehlampe)
            int k = t - 3;
            if      (t == 3) id(g_ltarget) = "${light1_entity}";
            else if (t == 4) id(g_ltarget) = "${light2_entity}";
            else             id(g_ltarget) = "${light3_entity}";
            lv_label_set_text(id(w_icon), (t == 5) ? "\U000F08DD" : "\U000F1051");
            lv_label_set_text(id(w_name), (t == 3) ? "Gradient" : (t == 4) ? "Lightstrip" : "Stehlampe");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), id(g_li_on)[k] ? id(g_li_pct)[k] : 0);
            if (id(g_li_on)[k]) snprintf(buf, sizeof(buf), "%d%%", id(g_li_pct)[k]);
            else                snprintf(buf, sizeof(buf), "Aus");
            lv_label_set_text(id(w_val), buf);
          } else if (t == 6) {                       // Apple TV
            lv_label_set_text(id(w_icon), "\U000F0035");   // mdi:apple
            lv_label_set_text(id(w_name), "Apple TV");
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), 0);
            const char* s = (id(g_tv_state) == 1) ? "Läuft" : (id(g_tv_state) == 2) ? "Pause" : "Aus";
            lv_label_set_text(id(w_val), s);
          } else if (t == 7) {                       // System-Info
            // Tile-Icon = Akku, beim Laden mdi:battery-charging-100 (+ grün)
            lv_label_set_text(id(w_icon), id(g_charging) ? "\U000F0085" : "\U000F0079");
            if (id(g_charging)) lv_obj_set_style_text_color(id(w_icon), lv_color_hex(0x66CC80), LV_PART_MAIN);
            lv_label_set_text(id(w_name), "System");
            // Akku-% grob aus Spannung (3.20V=0%, 4.10V=100%)
            float v = id(bat_volt).has_state() ? id(bat_volt).state : 0.0f;
            int bpct = (int)((v - 3.20f) / (4.10f - 3.20f) * 100.0f + 0.5f);
            if (bpct < 0) bpct = 0; if (bpct > 100) bpct = 100;
            lv_arc_set_range(id(w_arc), 0, 100);
            lv_arc_set_value(id(w_arc), bpct);
            float freeKB = id(sys_free).has_state() ? id(sys_free).state / 1024.0f : 0.0f;
            float loopms = id(sys_loop).has_state() ? id(sys_loop).state : 0.0f;
            char sb[128];
            snprintf(sb, sizeof(sb), "RAM frei: %.0f KB\nLast: %.0f ms\n%d %%  (%.2f V)\nHelligkeit: %d %%", freeKB, loopms, bpct, v, (int)(id(g_bright) + 0.5f));
            lv_label_set_text(id(w_sys), sb);
          } else if (t == 8) {                       // Timer
            lv_label_set_text(id(w_icon), "\U000F13AB");   // mdi:timer
            lv_label_set_text(id(w_name), "Timer");
            lv_arc_set_range(id(w_arc), 0, 180);
            int n = 0; for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) n++;
            bool addmode = id(g_add_mode) || (n == 0);
            const char* tn[] = { "Hummelflug", "Eye o.t. Tiger", "Für Elise" };
            const char* nm = tn[id(g_tone_idx)];
            // +-Button: Add-Modus -> Häkchen (bestätigen), sonst Plus
            lv_label_set_text(id(w_tmr_addico), addmode ? "\U000F012C" : "\U000F0415");
            char tb[48];
            if (addmode) {                            // neue Zeit einstellen (Wheel)
              lv_arc_set_value(id(w_arc), id(g_timer_set));
              snprintf(buf, sizeof(buf), "%d min", id(g_timer_set));
              lv_label_set_text(id(w_val), buf);
              snprintf(tb, sizeof(tb), "neuer Timer · Ton: %s", nm);
            } else {                                  // durch laufende Timer scrollen (Wheel)
              if (id(g_tmr)[id(g_tmr_sel)] <= 0) { for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) { id(g_tmr_sel) = i; break; } }
              int rem = id(g_tmr)[id(g_tmr_sel)];
              lv_arc_set_value(id(w_arc), rem / 60);
              snprintf(buf, sizeof(buf), "%d:%02d", rem / 60, rem % 60);
              lv_label_set_text(id(w_val), buf);
              snprintf(tb, sizeof(tb), "Timer %d von %d aktiv", id(g_tmr_sel) + 1, n);
            }
            lv_label_set_text(id(w_tmr_info), tb);
            // Arc in der Farbe des angezeigten Timers (Add-Modus: nächster freier Slot)
            const uint8_t C[5][3] = {{255,48,48},{255,140,0},{240,208,0},{64,200,96},{64,144,255}};
            int ci;
            if (addmode) { ci = 0; for (int i = 0; i < 5; i++) if (id(g_tmr)[i] == 0) { ci = i; break; } }
            else ci = id(g_tmr_sel);
            if (ci < 0 || ci > 4) ci = 0;
            lv_color_t tc = lv_color_make(C[ci][0], C[ci][1], C[ci][2]);
            lv_obj_set_style_arc_color(id(w_arc), tc, LV_PART_INDICATOR);
            lv_obj_set_style_text_color(id(w_icon), tc, LV_PART_MAIN);  // Uhr-Icon in Timer-Farbe
          }

  # --- Tippen: aktive Kachel schalten ---
  - id: tap_action
    then:
      - lambda: |-
          const int order[10] = ${tile_order};
          int t = order[id(g_tile)];
          if (t == 0) {
            // Ventilator: Tippen ohne Funktion (Stufe = Dial, Umkehren = Button)
          } else if (t == 1) {                       // Storen: Tippen inaktiv (Buttons öffnen/schließen)
            // nichts
          } else if (t == 2) {                       // Licht alle: alle an wenn aus, sonst alle aus
            bool any = id(g_li_on)[0] || id(g_li_on)[1] || id(g_li_on)[2];
            if (any) id(act_light_off).execute();    // g_ltarget = alle 3 (von render gesetzt)
            else     id(act_group_on).execute();
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe: toggeln
            id(act_light_toggle).execute();
          } else {                                   // Apple TV (6): Tippen ohne Funktion (Buttons)
            // nichts
          }

  # --- Knob: Wert der aktiven Kachel um delta ändern + an HA senden ---
  - id: knob_step
    parameters: { delta: int }
    then:
      - lambda: |-
          const int order[10] = ${tile_order};
          int t = order[id(g_tile)];
          int step = (delta > 0) ? 1 : -1;          // Knob: 1 Detent = 1 Schritt
          if (id(g_submode) == 1) {                  // Farbmenü: Hue drehen + live anwenden
            int h = id(g_hue) + step * 10;
            while (h < 0) h += 360; while (h >= 360) h -= 360;
            id(g_hue) = h;
            id(calc_rgb).execute();
            id(act_light_hue).execute();
            id(render_color).execute();
            return;
          }
          if (id(g_submode) == 3) return;            // Flug-Detail offen: Knob ohne Funktion
          if (id(g_submode) == 2) {                  // Timer-Liste: Auswahl durch laufende Timer scrollen
            int act[5], n = 0;
            for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) act[n++] = i;
            if (n > 0) {
              int pos = 0;
              for (int j = 0; j < n; j++) if (act[j] == id(g_tmr_sel)) pos = j;
              pos = (pos + (step > 0 ? 1 : -1) + n) % n;
              id(g_tmr_sel) = act[pos];
              id(render_timers).execute();
            }
            return;
          }
          if (t == 0) {                              // Ventilator: ~4 Klicks pro Stufe (Rad 32 Klicks/360°, Bogen ~300°)
            int K = ${fan_clicks_per_stage};
            id(g_fan_clicks) += step;
            if (id(g_fan_clicks) >= K) {
              id(g_fan_clicks) = 0;
              if (id(g_fan_speed) < 6) { id(g_fan_speed)++; id(act_fan_apply).execute(); }
            } else if (id(g_fan_clicks) <= -K) {
              id(g_fan_clicks) = 0;
              if (id(g_fan_speed) > 0) { id(g_fan_speed)--; id(act_fan_apply).execute(); }
            }
          } else if (t == 1) {                       // Storen: Knob inaktiv (Buttons öffnen/schließen)
            // nichts
          } else if (t == 2) {                       // Licht alle: absolute Master-Helligkeit (analog System), 1.875%/Klick
            int s = 0, n = 0;
            for (int k = 0; k < 3; k++) if (id(g_li_on)[k]) { s += id(g_li_pct)[k]; n++; }
            float base = n ? (float) s / n : id(g_all_pct);   // ab aktuellem Durchschnitt weiter
            float v = base + step * 1.875f; if (v < 10.0f) v = 10.0f; if (v > 100.0f) v = 100.0f;
            id(g_all_pct) = v;
            int iv = (int)(v + 0.5f);
            for (int k = 0; k < 3; k++) id(g_li_pct)[k] = iv;  // optimistisch: alle gleich
            id(g_set_pct) = iv;
            id(g_light_lock) = millis() + 1500;                // HA-Rückmeldung kurz ignorieren
            id(act_light_on).execute();                        // alle 3 -> iv (schaltet ein)
          } else if (t >= 3 && t <= 5) {             // Einzel-Lampe: ±5 % Helligkeit
            int k = t - 3;
            int v = id(g_li_pct)[k] + step * 5; if (v < 0) v = 0; if (v > 100) v = 100;
            id(g_li_pct)[k] = v; id(g_set_pct) = v;
            id(g_light_lock) = millis() + 1500;                // HA-Rückmeldung kurz ignorieren
            id(act_light_on).execute();
          } else if (t == 6) {                       // Apple TV: Lautstärke
            if (step > 0) id(act_tv_volup).execute();
            else          id(act_tv_voldn).execute();
          } else if (t == 7) {                       // System: Display-Helligkeit, 48 Klicks für 10..100 %
            float v = id(g_bright) + step * 1.875f;   // 90 % / 48 Klicks (= 1,5 Umdrehungen)
            if (v < 10.0f) v = 10.0f; if (v > 100.0f) v = 100.0f;
            id(g_bright) = v;
            id(apply_bright).execute();
          } else if (t == 8) {                       // Timer
            int n = 0; for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) n++;
            bool addmode = id(g_add_mode) || (n == 0);
            if (addmode) {                           // + aktiv: Minuten einstellen 0..180
              int v = id(g_timer_set) + step * ${timer_min_per_click};
              if (v < 0) v = 0; if (v > 180) v = 180;
              id(g_timer_set) = v;
            } else {                                 // sonst: durch laufende Timer scrollen
              int act[5], m = 0;
              for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) act[m++] = i;
              int pos = 0;
              for (int j = 0; j < m; j++) if (act[j] == id(g_tmr_sel)) pos = j;
              pos = (pos + (step > 0 ? 1 : -1) + m) % m;
              id(g_tmr_sel) = act[pos];
            }
          } else {                                   // Flugradar (9): Radius 10..50 km (32 Klicks)
            float v = id(g_radius_km) + step * 1.25f;
            if (v < 10.0f) v = 10.0f; if (v > 50.0f) v = 50.0f;
            id(g_radius_km) = v;
          }
      - lambda: |-
          const int o[10] = ${tile_order};
          if (o[id(g_tile)] == 9) id(render_radar).execute();
          else id(render).execute();

  # --- HA-Service-Wrapper (eigene Scripts, damit Lambdas sie aufrufen können) ---
  # Ventilator (RF): aktuelle Stufe -> passendes HA-Script auslösen
  - id: act_fan_apply
    then:
      - homeassistant.action:
          action: script.turn_on
          data:
            entity_id: !lambda |-
              switch (id(g_fan_speed)) {
                case 1: return "script.ventilator_wohnzimmer_speed_1_t";
                case 2: return "script.ventilator_wohnzimmer_speed_2";
                case 3: return "script.ventilator_wohnzimmer_speed_3";
                case 4: return "script.ventilator_wohnzimmer_speed_3_duplizieren";
                case 5: return "script.ventilator_wohnzimmer_speed_5";
                case 6: return "script.ventilator_wohnzimmer_speed_6";
                default: return "script.ventilator_wohnzimmer_stop";   // 0 = Stop
              }
  - id: act_fan_reverse
    then:
      - homeassistant.action:
          action: script.turn_on
          data: { entity_id: "script.ventilator_wohnzimmer_umkehren" }
  - id: act_cover_open
    then:
      - homeassistant.action: { action: cover.open_cover, data: { entity_id: "${cover_entity}" } }
  - id: act_cover_close
    then:
      - homeassistant.action: { action: cover.close_cover, data: { entity_id: "${cover_entity}" } }
  # Licht: alle Actions zielen auf g_ltarget (eine Lampe oder die 3 als Komma-Liste).
  # g_ltarget wird im render-Script je aktiver Kachel gesetzt.
  - id: act_light_toggle
    then:
      - homeassistant.action:
          action: light.toggle
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  - id: act_light_on            # einschalten / dimmen auf g_set_pct
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            brightness_pct: !lambda 'return id(g_set_pct);'
  - id: act_light_off
    then:
      - homeassistant.action:
          action: light.turn_off
          data: { entity_id: !lambda 'return id(g_ltarget);' }
  # --- Licht alle (Master) ---
  # Pro-Lampe-Helligkeit (eigene Entity + eigener g_li_pct, keine geteilten Variablen)
  - id: act_l1_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light1_entity}", brightness_pct: !lambda 'return id(g_li_pct)[0];' }
  - id: act_l2_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light2_entity}", brightness_pct: !lambda 'return id(g_li_pct)[1];' }
  - id: act_l3_bri
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: "${light3_entity}", brightness_pct: !lambda 'return id(g_li_pct)[2];' }
  # Relatives Dimmen: nur eingeschaltete Lampen auf ihren neuen g_li_pct setzen
  - id: act_group_dim
    then:
      - if: { condition: { lambda: 'return id(g_li_on)[0];' }, then: [ script.execute: act_l1_bri ] }
      - if: { condition: { lambda: 'return id(g_li_on)[1];' }, then: [ script.execute: act_l2_bri ] }
      - if: { condition: { lambda: 'return id(g_li_on)[2];' }, then: [ script.execute: act_l3_bri ] }
  # Alle drei einschalten (ohne Helligkeit -> jede Lampe kehrt zu ihrem letzten Wert zurück)
  - id: act_group_on
    then:
      - homeassistant.action:
          action: light.turn_on
          data: { entity_id: !lambda 'return id(g_ltarget);' }

  # --- Apple TV ---
  - id: act_tv_playpause      # ein Button: toggelt Play/Pause
    then:
      - homeassistant.action: { action: media_player.media_play_pause, data: { entity_id: "${tv_media_entity}" } }
  - id: act_tv_power          # Apple TV schlafen/aufwecken via remote.send_command
    then:                     #  g_tv_state==0 => Aus => wakeup, sonst suspend. Optimistisch sofort umschalten.
      - if:
          condition: { lambda: 'return id(g_tv_state) != 0;' }
          then:
            - homeassistant.action: { action: remote.send_command, data: { entity_id: "${tv_remote_entity}", command: "suspend" } }
            - lambda: 'id(g_tv_state) = 0; id(render).execute();'
          else:
            - homeassistant.action: { action: remote.send_command, data: { entity_id: "${tv_remote_entity}", command: "wakeup" } }
            - lambda: 'id(g_tv_state) = 2; id(render).execute();'
  - id: act_tv_volup
    then:
      - homeassistant.action: { action: media_player.volume_up, data: { entity_id: "${tv_media_entity}" } }
  - id: act_tv_voldn
    then:
      - homeassistant.action: { action: media_player.volume_down, data: { entity_id: "${tv_media_entity}" } }

  # --- Display-Sleep ---
  - id: idle_timer            # nach 60s ohne Interaktion Backlight aus
    mode: restart
    then:
      - delay: 60s
      - lambda: 'id(g_disp_off) = true;'
      - light.turn_off: backlight_light
  - id: wake_display          # Backlight an (gespeicherte Helligkeit) + Timer neu starten
    then:
      - lambda: 'id(g_disp_off) = false;'
      - light.turn_on: { id: backlight_light, brightness: !lambda 'return id(g_bright) / 100.0f;' }
      - script.execute: idle_timer
  - id: apply_bright          # eingestellte Display-Helligkeit sofort anwenden (kein Fade)
    then:
      - light.turn_on:
          id: backlight_light
          brightness: !lambda 'return id(g_bright) / 100.0f;'
          transition_length: 0s

  # --- Timer ---
  - id: start_timer           # neuen Timer mit g_timer_set Minuten in freiem Slot starten
    then:
      - lambda: |-
          if (id(g_timer_set) <= 0) return;
          for (int i = 0; i < 5; i++) {
            if (id(g_tmr)[i] == 0) { id(g_tmr)[i] = id(g_timer_set) * 60; break; }
          }
      - script.execute: render
  - id: timer_plus            # +-Button: erst Zeit-Modus, beim 2. Tipp (✓) Timer hinzufügen
    then:
      - lambda: |-
          int n = 0; for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) n++;
          bool addmode = id(g_add_mode) || (n == 0);
          if (addmode) { id(start_timer).execute(); id(g_add_mode) = false; }
          else         { id(g_add_mode) = true; }
      - script.execute: render
  - id: cancel_all            # alle Timer abbrechen + Alarm/Ton/Ring stoppen
    then:
      - lambda: 'for (int i = 0; i < 5; i++) id(g_tmr)[i] = 0; id(g_alarm) = false;'
      - rtttl.stop:
      - light.turn_off: ring_light
      - script.execute: render
  - id: dismiss_alarm         # Alarm quittieren (Tippen aufs Display): Ton + Blinken aus
    then:
      - lambda: 'id(g_alarm) = false;'
      - rtttl.stop:
      - light.turn_off: ring_light
  - id: tone_cycle            # Tonfolge weiterschalten + Vorschau abspielen
    then:
      - lambda: 'id(g_tone_idx) = (id(g_tone_idx) + 1) % 3;'
      - script.execute: play_tone
      - script.execute: render
  - id: play_tone             # gewählte Tonfolge über den Speaker spielen
    then:
      - rtttl.play: !lambda |-
          switch (id(g_tone_idx)) {
            case 0:  // Flight of the Bumblebee
              return "bumblebee:d=16,o=5,b=160:e6,d#6,d6,c#6,c6,b,a#,a,g#,g,f#,f,e,d#,d,c#,c,b4,a#4,a4,g#4,a4,a#4,b4,c,c#,d,d#,e,f,f#,g,g#,a,a#,b,c6,c#6,d6,d#6";
            case 1:  // Eye of the Tiger
              return "tiger:d=8,o=5,b=109:c,c,d#,c,p,c,d#,c,p,c,d#,c,a#4,p,c,c,d#,c,p,c,d#,c,p,c,d#,f,d#,c";
            default: // Für Elise
              return "elise:d=8,o=5,b=125:e6,d#6,e6,d#6,e6,b,d6,c6,a,p,c,e,a,b,p,e,g#,b,c6,p,e,e6,d#6,e6,d#6,e6,b,d6,c6,a,p,c,e,a,b,p,e,c6,b,a";
          }

  # --- Aktive-Timer-Liste (Swipe up) ---
  - id: render_timers         # Zeilen je Slot füllen/verstecken
    then:
      - lambda: |-
          char b[28];
          int sel = id(g_tmr_sel);
          // Slot 0
          if (id(g_tmr)[0] > 0) {
            snprintf(b, sizeof(b), "%sTimer 1   %d:%02d", sel == 0 ? "> " : "  ", id(g_tmr)[0] / 60, id(g_tmr)[0] % 60);
            lv_label_set_text(id(w_tl0), b);
            lv_obj_clear_flag(id(w_tl0), LV_OBJ_FLAG_HIDDEN); lv_obj_clear_flag(id(w_tc0), LV_OBJ_FLAG_HIDDEN);
          } else { lv_obj_add_flag(id(w_tl0), LV_OBJ_FLAG_HIDDEN); lv_obj_add_flag(id(w_tc0), LV_OBJ_FLAG_HIDDEN); }
          // Slot 1
          if (id(g_tmr)[1] > 0) {
            snprintf(b, sizeof(b), "%sTimer 2   %d:%02d", sel == 1 ? "> " : "  ", id(g_tmr)[1] / 60, id(g_tmr)[1] % 60);
            lv_label_set_text(id(w_tl1), b);
            lv_obj_clear_flag(id(w_tl1), LV_OBJ_FLAG_HIDDEN); lv_obj_clear_flag(id(w_tc1), LV_OBJ_FLAG_HIDDEN);
          } else { lv_obj_add_flag(id(w_tl1), LV_OBJ_FLAG_HIDDEN); lv_obj_add_flag(id(w_tc1), LV_OBJ_FLAG_HIDDEN); }
          // Slot 2
          if (id(g_tmr)[2] > 0) {
            snprintf(b, sizeof(b), "%sTimer 3   %d:%02d", sel == 2 ? "> " : "  ", id(g_tmr)[2] / 60, id(g_tmr)[2] % 60);
            lv_label_set_text(id(w_tl2), b);
            lv_obj_clear_flag(id(w_tl2), LV_OBJ_FLAG_HIDDEN); lv_obj_clear_flag(id(w_tc2), LV_OBJ_FLAG_HIDDEN);
          } else { lv_obj_add_flag(id(w_tl2), LV_OBJ_FLAG_HIDDEN); lv_obj_add_flag(id(w_tc2), LV_OBJ_FLAG_HIDDEN); }
          // Slot 3
          if (id(g_tmr)[3] > 0) {
            snprintf(b, sizeof(b), "%sTimer 4   %d:%02d", sel == 3 ? "> " : "  ", id(g_tmr)[3] / 60, id(g_tmr)[3] % 60);
            lv_label_set_text(id(w_tl3), b);
            lv_obj_clear_flag(id(w_tl3), LV_OBJ_FLAG_HIDDEN); lv_obj_clear_flag(id(w_tc3), LV_OBJ_FLAG_HIDDEN);
          } else { lv_obj_add_flag(id(w_tl3), LV_OBJ_FLAG_HIDDEN); lv_obj_add_flag(id(w_tc3), LV_OBJ_FLAG_HIDDEN); }
          // Slot 4
          if (id(g_tmr)[4] > 0) {
            snprintf(b, sizeof(b), "%sTimer 5   %d:%02d", sel == 4 ? "> " : "  ", id(g_tmr)[4] / 60, id(g_tmr)[4] % 60);
            lv_label_set_text(id(w_tl4), b);
            lv_obj_clear_flag(id(w_tl4), LV_OBJ_FLAG_HIDDEN); lv_obj_clear_flag(id(w_tc4), LV_OBJ_FLAG_HIDDEN);
          } else { lv_obj_add_flag(id(w_tl4), LV_OBJ_FLAG_HIDDEN); lv_obj_add_flag(id(w_tc4), LV_OBJ_FLAG_HIDDEN); }
          bool any = id(g_tmr)[0] > 0 || id(g_tmr)[1] > 0 || id(g_tmr)[2] > 0 || id(g_tmr)[3] > 0 || id(g_tmr)[4] > 0;
          lv_label_set_text(id(w_tl_title), any ? "Aktive Timer" : "Keine Timer");
  - id: enter_timers
    then:
      - lambda: |-
          id(g_submode) = 2;
          // Auswahl auf den ersten laufenden Timer setzen
          for (int i = 0; i < 5; i++) if (id(g_tmr)[i] > 0) { id(g_tmr_sel) = i; break; }
          id(render_timers).execute();
      - lvgl.page.show: page_timers
  - id: exit_timers
    then:
      - lambda: 'id(g_submode) = 0;'
      - lvgl.page.show: page_main
      - lambda: 'id(render).execute();'
  - id: cancel_one            # einen Timer-Slot abbrechen
    parameters: { slot: int }
    then:
      - lambda: |-
          if (slot >= 0 && slot < 5) id(g_tmr)[slot] = 0;
      - script.execute: render_timers

  # --- Flugradar ---
  - id: get_token             # OAuth2-Token holen (client_credentials), danach Flüge abrufen
    then:
      - http_request.post:
          url: "https://auth.opensky-network.org/auth/realms/opensky-network/protocol/openid-connect/token"
          request_headers:
            Content-Type: application/x-www-form-urlencoded
          body: !secret opensky_oauth_body
          capture_response: true
          max_response_buffer_size: 4000
          on_response:
            - lambda: |-
                if (response->status_code != 200) { ESP_LOGW("radar", "Token HTTP %d", response->status_code); return; }
                json::parse_json(body, [](JsonObject root) -> bool {
                  const char* t = root["access_token"];
                  if (t) { g_token = t; g_authhdr = std::string("Bearer ") + g_token; }
                  int exp = root["expires_in"].is<int>() ? root["expires_in"].as<int>() : 1800;
                  g_token_exp = millis() + (uint32_t)(exp > 120 ? exp - 60 : exp) * 1000;
                  return true;
                });
                ESP_LOGI("radar", "Token erneuert (len %d)", (int) g_token.size());
            - script.execute: fetch_planes
  - id: radar_fetch           # gültigen Token sicherstellen, dann Flüge holen
    then:
      - if:
          condition: { lambda: 'return !g_token.empty() && millis() < g_token_exp;' }
          then:
            - script.execute: fetch_planes
          else:
            - script.execute: get_token
  - id: fetch_planes          # OpenSky-Flugzeuge im aktuellen Radius holen
    then:
      - http_request.get:
          url: !lambda |-
            float r = id(g_radius_km);
            float lat0 = ${home_lat}, lon0 = ${home_lon};
            float dlat = r / 111.0f;
            float dlon = r / (111.0f * cosf(lat0 * 0.01745329f));
            char u[220];
            snprintf(u, sizeof(u),
              "https://opensky-network.org/api/states/all?lamin=%.4f&lomin=%.4f&lamax=%.4f&lomax=%.4f",
              lat0 - dlat, lon0 - dlon, lat0 + dlat, lon0 + dlon);
            return std::string(u);
          request_headers:
            Authorization: !lambda 'return g_authhdr.c_str();'
          capture_response: true
          max_response_buffer_size: 40000
          on_response:
            - lambda: |-
                if (response->status_code != 200) { ESP_LOGW("radar", "HTTP %d", response->status_code); return; }
                bool ok = json::parse_json(body, [](JsonObject root) -> bool {
                  JsonArray states = root["states"].as<JsonArray>();
                  g_planes.clear();
                  const float lat0 = ${home_lat}, lon0 = ${home_lon};
                  const float cl = cosf(lat0 * 0.01745329f);
                  for (JsonVariant v : states) {
                    JsonArray s = v.as<JsonArray>();
                    if (s.isNull()) continue;
                    Aircraft a;
                    const char* cs = s[1];
                    a.cs = cs ? std::string(cs) : std::string("");
                    while (!a.cs.empty() && a.cs.back() == ' ') a.cs.pop_back();
                    if (!s[5].isNull()) a.lon = s[5].as<float>();
                    if (!s[6].isNull()) a.lat = s[6].as<float>();
                    if (!s[7].isNull()) a.alt = s[7].as<float>();
                    a.gnd = s[8].as<bool>();
                    if (!s[9].isNull())  a.vel = s[9].as<float>();
                    if (!s[10].isNull()) a.trk = s[10].as<float>();
                    if (a.lat == 0.0f && a.lon == 0.0f) continue;
                    float dx = (a.lon - lon0) * 111.0f * cl;
                    float dy = (a.lat - lat0) * 111.0f;
                    a.dist = sqrtf(dx * dx + dy * dy);
                    if (a.dist <= id(g_radius_km)) g_planes.push_back(a);
                  }
                  return true;
                });
                std::sort(g_planes.begin(), g_planes.end(),
                          [](const Aircraft &a, const Aircraft &b) { return a.dist < b.dist; });
                ESP_LOGI("radar", "%d Flugzeuge im Radius %.0f km (parse %s)",
                         (int) g_planes.size(), id(g_radius_km), ok ? "ok" : "FAIL");
                id(render_radar).execute();
  - id: render_radar          # Flugzeuge auf das Radar projizieren
    then:
      - lambda: |-
          lv_obj_t* ico[10] = { id(w_pl0), id(w_pl1), id(w_pl2), id(w_pl3), id(w_pl4), id(w_pl5), id(w_pl6), id(w_pl7), id(w_pl8), id(w_pl9) };
          lv_obj_t* txt[10] = { id(w_pc0), id(w_pc1), id(w_pc2), id(w_pc3), id(w_pc4), id(w_pc5), id(w_pc6), id(w_pc7), id(w_pc8), id(w_pc9) };
          const float lat0 = ${home_lat}, lon0 = ${home_lon};
          const float cl = cosf(lat0 * 0.01745329f);
          float r = id(g_radius_km);
          float scale = 169.0f / r;                  // px pro km (äußerer Ring)
          int shown = 0;
          for (size_t k = 0; k < g_planes.size() && shown < 10; k++) {
            Aircraft &a = g_planes[k];
            if (a.dist > r) continue;
            int sx = (int)((a.lon - lon0) * 111.0f * cl * scale);
            int sy = (int)(-(a.lat - lat0) * 111.0f * scale);
            lv_obj_align(ico[shown], LV_ALIGN_CENTER, sx, sy);
            lv_image_set_pivot(ico[shown], 14, 14);            // um Mitte drehen
            lv_image_set_rotation(ico[shown], (int)(a.trk * 10.0f));  // Nase in Flugrichtung (0.1°)
            lv_obj_align(txt[shown], LV_ALIGN_CENTER, sx, sy + 14);
            lv_label_set_text(txt[shown], a.cs.empty() ? "?" : a.cs.c_str());
            lv_obj_clear_flag(ico[shown], LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(txt[shown], LV_OBJ_FLAG_HIDDEN);
            g_shown_x[shown] = sx; g_shown_y[shown] = sy; g_shown_pi[shown] = (int) k;  // für Tipp-Trefferprüfung
            shown++;
          }
          for (int i = shown; i < 10; i++) {
            lv_obj_add_flag(ico[i], LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(txt[i], LV_OBJ_FLAG_HIDDEN);
          }
          g_shown_n = shown;
          char st[48];
          snprintf(st, sizeof(st), "Flugradar   %.0f km   %d Flug%s", r, shown, shown == 1 ? "" : "e");
          lv_label_set_text(id(w_radar_status), st);
          // offenes Detail-Overlay live nachführen (Flug per Callsign wiederfinden)
          if (id(g_submode) == 3 && !g_sel_cs.empty()) {
            for (auto &p : g_planes) if (p.cs == g_sel_cs) { g_sel_ac = p; break; }
            id(render_details).execute();
          }
  - id: nav_update            # je nach aktiver Kachel die richtige Seite zeigen
    then:
      - if:
          condition: { lambda: 'const int o[10] = ${tile_order}; return o[id(g_tile)] == 9;' }
          then:
            - lvgl.page.show: page_radar
            - script.execute: render_radar
            - script.execute: radar_fetch
          else:
            - lvgl.page.show: page_main
            - script.execute: render
  - id: radar_tap             # Tippen aufs Radar: nächsten Marker wählen -> Details
    then:
      - lambda: |-
          int tx = id(g_xl) - 180, ty = id(g_yl) - 180;
          int best = -1, bestd = 28 * 28;            // Trefferradius ~28 px
          for (int i = 0; i < g_shown_n; i++) {
            int ddx = tx - g_shown_x[i], ddy = ty - g_shown_y[i];
            int d2 = ddx * ddx + ddy * ddy;
            if (d2 < bestd) { bestd = d2; best = i; }
          }
          if (best >= 0) {
            int pi = g_shown_pi[best];
            if (pi >= 0 && pi < (int) g_planes.size()) {
              g_sel_ac = g_planes[pi];
              g_sel_cs = g_sel_ac.cs;
              id(g_submode) = 3;
              id(render_details).execute();
            }
          }
  - id: render_details        # Detail-Overlay füllen + zeigen
    then:
      - lambda: |-
          Aircraft &a = g_sel_ac;
          lv_label_set_text(id(w_det_cs), a.cs.empty() ? "?" : a.cs.c_str());
          char b[160];
          snprintf(b, sizeof(b), "Höhe: %.0f m\nSpeed: %.0f km/h\nKurs: %.0f°\nDistanz: %.1f km",
                   a.alt, a.vel * 3.6f, a.trk, a.dist);
          lv_label_set_text(id(w_det_info), b);
          lv_obj_clear_flag(id(w_det_panel), LV_OBJ_FLAG_HIDDEN);
  - id: close_details         # Detail-Overlay schließen
    then:
      - lambda: |-
          id(g_submode) = 0;
          g_sel_cs = "";
          lv_obj_add_flag(id(w_det_panel), LV_OBJ_FLAG_HIDDEN);

  - id: act_light_color         # aktuelles Preset auf g_ltarget anwenden (schaltet auch ein)
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
            color_name: !lambda |-
              switch (id(g_color_idx)) {
                case 0: return "bisque";           // Warmweiß
                case 1: return "darkorange";
                case 2: return "cornflowerblue";
                case 3: return "mediumpurple";
                case 4: return "orchid";
                default: return "tomato";          // 5
              }

  # Aktions-Button-Dispatcher: Ventilator -> Umkehren, Licht -> Farbmenü öffnen
  - id: act_button
    then:
      - lambda: |-
          const int order[10] = ${tile_order};
          int t = order[id(g_tile)];
          if (t == 0) {
            id(act_fan_reverse).execute();
          } else if (t >= 3 && t <= 5) {
            id(enter_color).execute();      // Paletten-Icon = Farbmenü (nur Einzel-Lampen)
          }

  # --- Farbmenü ---
  # Hue (0..359) -> RGB (S=V=1) in g_cr/g_cg/g_cb
  - id: calc_rgb
    then:
      - lambda: |-
          float hh = id(g_hue) / 60.0f;
          int i = ((int) hh) % 6; if (i < 0) i += 6;
          float f = hh - (int) hh;
          float r = 0, g = 0, b = 0;
          switch (i) {
            case 0: r = 1;     g = f;     b = 0;     break;
            case 1: r = 1 - f; g = 1;     b = 0;     break;
            case 2: r = 0;     g = 1;     b = f;     break;
            case 3: r = 0;     g = 1 - f; b = 1;     break;
            case 4: r = f;     g = 0;     b = 1;     break;
            default: r = 1;    g = 0;     b = 1 - f; break;
          }
          id(g_cr) = (int)(r * 255); id(g_cg) = (int)(g * 255); id(g_cb) = (int)(b * 255);
  # Farbmenü-Seite zeichnen (Titel + Vorschau-Kreis)
  - id: render_color
    then:
      - lambda: |-
          const int order[10] = ${tile_order};
          int t = order[id(g_tile)];
          lv_label_set_text(id(w_col_title),
            (t == 2) ? "Licht (alle)" : (t == 3) ? "Gradient" : (t == 4) ? "Lightstrip" : (t == 5) ? "Stehlampe" : "Farbe");
          uint32_t col = ((uint32_t) id(g_cr) << 16) | ((uint32_t) id(g_cg) << 8) | (uint32_t) id(g_cb);
          lv_obj_set_style_bg_color(id(w_col_prev), lv_color_hex(col), LV_PART_MAIN);
          lv_obj_invalidate(id(w_col_prev));
  - id: enter_color
    then:
      - lambda: 'id(g_submode) = 1; id(calc_rgb).execute(); id(render_color).execute();'
      - lvgl.page.show: page_color
  - id: exit_color
    then:
      - lambda: 'id(g_submode) = 0;'
      - lvgl.page.show: page_main
      - lambda: 'id(render).execute();'
  # Farbe an HA senden (rgb_color aus g_cr/g_cg/g_cb; schaltet auch ein)
  - id: act_light_hue
    then:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: !lambda 'return id(g_ltarget);'
          variables:
            r: !lambda 'return id(g_cr);'
            g: !lambda 'return id(g_cg);'
            b: !lambda 'return id(g_cb);'
          data_template:
            rgb_color: "{{ [r, g, b] }}"
