###############################################################################
# FONTS
###############################################################################
font:
  - file: "gfonts://Roboto"
    id: font_name
    size: 30
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_val
    size: 52
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_dots
    size: 22
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  - file: "gfonts://Roboto"
    id: font_sys
    size: 26
    glyphsets: [GF_Latin_Core]
    ignore_missing_glyphs: true
  # Material-Design-Icons (TTF wird beim Kompilieren geladen -> Build-Host braucht Internet)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon
    size: 72
    bpp: 4
    glyphs:
      - "\U000F0210"   # mdi:fan
      - "\U000F111C"   # mdi:window-shutter
      - "\U000F1253"   # mdi:lightbulb-group (Sammel-Kachel)
      - "\U000F1051"   # mdi:led-strip-variant (Gradient/Lightstrip)
      - "\U000F08DD"   # mdi:floor-lamp (Stehlampe)
      - "\U000F0035"   # mdi:apple (Apple TV)
      - "\U000F061A"   # mdi:chip (System-Info)
      - "\U000F13AB"   # mdi:timer (Timer)
  - file: "https://github.com/Templarian/MaterialDesign-Webfont/raw/v7.4.47/fonts/materialdesignicons-webfont.ttf"
    id: font_icon_sm
    size: 40
    bpp: 4
    glyphs:
      - "\U000F006A"   # mdi:autorenew (Drehrichtung umkehren)
      - "\U000F03D8"   # mdi:palette (Farb-Preset wechseln)
      - "\U000F0737"   # mdi:arrow-up-bold (Storen öffnen)
      - "\U000F072E"   # mdi:arrow-down-bold (Storen schließen)
      - "\U000F040E"   # mdi:play-pause (Apple TV Toggle)
      - "\U000F0425"   # mdi:power (Apple TV an/aus)
      - "\U000F040A"   # mdi:play (Timer Start)
      - "\U000F04DB"   # mdi:stop (Timer abbrechen)
      - "\U000F0387"   # mdi:music-note (Ton wählen)

###############################################################################
# LVGL  (eine Seite; alle Werte werden vom render-Script gesetzt)
###############################################################################
lvgl:
  buffer_size: 24%            # Draw-Buffer in schnelles internes RAM (nicht PSRAM)
  displays: [main_display]
  touchscreens: [my_touch]
  bg_color: 0x000000
  pages:
    - id: page_main
      bg_color: 0x000000
      widgets:
        - arc:
            id: w_arc
            align: CENTER
            width: 320
            height: 320
            arc_width: 14
            min_value: 0
            max_value: 100
            value: 0
            adjustable: false
            arc_color: 0x202020
            indicator: { arc_color: 0x3DA9FC, arc_width: 14 }
            knob: { bg_opa: TRANSP }
        - label:
            id: w_icon
            align: CENTER
            y: -92
            text_font: font_icon
            text_color: 0xFFFFFF
            text: "\U000F0210"
        - label:
            id: w_name
            align: CENTER
            y: -44
            text_font: font_name
