###############################################################################
# Guition JC3636K718C  —  Steuer-Panel für Home Assistant
# 3 Kacheln: Ventilator / Storen / Licht  (Wohnzimmer)
#   • Horizontal wischen  -> Kachel wechseln
#   • Tippen              -> schalten (Fan toggle / Storen auf-zu / Licht toggle)
#   • Knob drehen         -> Wert stellen (Drehzahl % / Position % / Helligkeit %)
#
# Pins & Display-Init stammen aus dem offiziellen Hersteller-Demo
# (JC3636K718_knob_EN) – NICHT verändern.  Erster Flash MUSS über USB erfolgen
# (16-MB-Partitionstabelle lässt sich nicht per OTA einspielen), danach geht OTA.
###############################################################################

substitutions:
  name: wohnzimmer-knob
  friendly_name: "Wohnzimmer Knob"
  timezone: "Europe/Zurich"

  # >>> HIER deine Home-Assistant-Entitäten eintragen <<<
  # Ventilator: RF -> über HA-Scripts gesteuert. Die Scripts setzen den Helfer
  #   input_number.fan_wohnzimmer_speed (0..6) -> daraus lesen wir die Ist-Stufe.
  #   Stufen-Scripts sind in act_fan_apply / act_fan_reverse hart hinterlegt.
  fan_speed_entity: "input_number.fan_wohnzimmer_speed"
  fan_clicks_per_stage: "4"   # Rad = 32 Klicks/360°, Bogen ~300°/7 -> ~4 Klicks pro Stufe
  timer_min_per_click: "1"    # Minuten pro Knob-Klick auf der Timer-Kachel (0..180)
  # Carousel-Reihenfolge: Position -> Tile-Typ (0=Fan 1=Cover 2=LichtAlle 3=Gradient
  # 4=Lightstrip 5=Stehlampe 6=AppleTV 7=System 8=Timer). Hier: Timer, AppleTV, Rest.
  tile_order: "{8, 6, 0, 1, 2, 3, 4, 5, 7, 9}"
  cover_entity: "cover.store_wohnzimmer_sud"
  # Drei Hue-Leuchten im Wohnzimmer (+ Sammel-Kachel steuert alle gemeinsam)
  light1_entity: "light.gradient_lightstrip_wohnzimmer"
  light2_entity: "light.lightstrip_wohnzimmer"
  light3_entity: "light.stehlampe_wohnzimmer"
  # Apple TV (Esszimmer)
  tv_media_entity: "media_player.wohnzimmer_2"
  tv_remote_entity: "remote.wohnzimmer"
  # Flugradar (OpenSky) – Home-Koordinaten für Projektion/Bounding-Box
  home_lat: "47.189425"
  home_lon: "8.719065"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - flight.h
  on_boot:
    priority: -100
    then:
      # Helligkeit absichern (fängt ungültige/alte gespeicherte Werte ab, sonst dunkel)
      - lambda: 'if (!(id(g_bright) >= 10.0f && id(g_bright) <= 100.0f)) id(g_bright) = 100.0f;'
      - lambda: 'id(nav_update).execute();'
      - light.turn_on: { id: backlight_light, brightness: !lambda 'return id(g_bright) / 100.0f;' }
      - script.execute: idle_timer

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  partitions: partitions.csv      # MAX-App-Layout -> erster Flash per USB!
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE: y          # HTTPS (OpenSky) Root-CAs
      CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_FULL: y

psram:
  mode: octal
  speed: 80MHz

logger:
  level: INFO               # DEBUG/VERBOSE nur zur Diagnose

# Diagnose-Daten fürs System-Menü (freier Heap, Loop-Zeit)
debug:
  update_interval: 5s

# HTTPS-Client für OpenSky (Flugradar)
http_request:
  id: http_radar
  useragent: wohnzimmer-knob
  timeout: 12s
  buffer_size_tx: 4096      # großer Bearer-Token-Header (~1500 Zeichen) muss reinpassen
  buffer_size_rx: 4096

# System-Kachel alle paar Sekunden neu zeichnen (Sensoren triggern kein Render)
interval:
  - interval: 3s
    then:
      - if:
          condition: { lambda: 'const int o[10] = ${tile_order}; return o[id(g_tile)] == 7;' }
          then:
            - script.execute: render
  # Flugradar: nur abrufen, wenn man auf der Radar-Kachel ist (schont OpenSky-Rate-Limit)
  - interval: 30s
    then:
      - if:
          condition: { lambda: 'const int o[10] = ${tile_order}; return o[id(g_tile)] == 9;' }
          then:
            - script.execute: radar_fetch
  # Timer-Countdown: jede Sekunde laufende Timer runterzählen, bei 0 Ton spielen
  - interval: 1s
    then:
      - lambda: |-
          bool was_alarm = id(g_alarm);
          for (int i = 0; i < 5; i++) {
            if (id(g_tmr)[i] > 0) {
              id(g_tmr)[i]--;
              if (id(g_tmr)[i] == 0) { id(g_alarm) = true; id(g_alarm_color) = i; }
            }
          }
          if (id(g_alarm) && !was_alarm) {            // Übergang in Alarm: Ton + Display wecken
            id(play_tone).execute();
            if (id(g_disp_off)) id(wake_display).execute();
          }
          if (id(g_submode) == 2) id(render_timers).execute();
          else { const int o[10] = ${tile_order}; if (o[id(g_tile)] == 8) id(render).execute(); }
  # Ring-Blinken während eines Timer-Alarms (Farbe = Slot: 0 rot, 1 grün, 2 blau)
  - interval: 0.4s
    then:
      - if:
          condition: { lambda: 'return id(g_alarm);' }
          then:
            - lambda: 'id(g_blink_on) = !id(g_blink_on);'
            - if:
                condition: { lambda: 'return id(g_blink_on);' }
                then:
                  - light.turn_on:
                      id: ring_light
                      transition_length: 0s
                      brightness: 100%
                      red:   !lambda 'const uint8_t C[5][3]={{255,48,48},{255,140,0},{240,208,0},{64,200,96},{64,144,255}}; int i=id(g_alarm_color); if(i<0||i>4)i=0; return C[i][0]/255.0f;'
                      green: !lambda 'const uint8_t C[5][3]={{255,48,48},{255,140,0},{240,208,0},{64,200,96},{64,144,255}}; int i=id(g_alarm_color); if(i<0||i>4)i=0; return C[i][1]/255.0f;'
                      blue:  !lambda 'const uint8_t C[5][3]={{255,48,48},{255,140,0},{240,208,0},{64,200,96},{64,144,255}}; int i=id(g_alarm_color); if(i<0||i>4)i=0; return C[i][2]/255.0f;'
                else:
                  - light.turn_off: { id: ring_light, transition_length: 0s }

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true       # nötig für verstecktes (nicht gebroadcastetes) WLAN
  ap:
    ssid: "${friendly_name} Setup"

# Sicherheit gegen OTA-Rollback: erst nach gut 1 Min „good" markieren (esp-idf).
safe_mode:

time:
  - platform: homeassistant
    id: ha_time
    timezone: ${timezone}

###############################################################################
# HARDWARE  (autoritativ aus dem Hersteller-Demo – nicht ändern)
###############################################################################
spi:
  id: display_qspi
  type: quad
  clk_pin: 11
  data_pins: [13, 14, 15, 16]

i2c:
  sda: 9
  scl: 10
  id: touch_bus

output:
  - platform: ledc
    pin: GPIO21
    id: backlight_output

light:
  - platform: monochromatic
    output: backlight_output
    name: "Backlight"
    id: backlight_light
    restore_mode: ALWAYS_ON
  # WS2812-Ring (13 LED) auf GPIO0 (BOOT/Strapping – Strapping-Warnung ist normal).
  - platform: esp32_rmt_led_strip
    id: ring_light
    name: "${friendly_name} Ring"
    pin: GPIO0
    num_leds: 13
    rgb_order: GRB
    chipset: WS2812
    rmt_symbols: 128
    use_dma: true
    restore_mode: RESTORE_DEFAULT_OFF

# --- Audio (PCM5100A I2S-DAC + Speaker) für Timer-Töne ---
i2s_audio:
  i2s_lrclk_pin: GPIO45
  i2s_bclk_pin: GPIO3

speaker:
  - platform: i2s_audio
    id: spk
    dac_type: external
    i2s_dout_pin: GPIO42

switch:
  - platform: gpio          # DAC-MUTE auf GPIO46: HIGH = Ton an (beim Boot setzen)
    pin: GPIO46
    id: dac_unmute
    restore_mode: ALWAYS_ON
    internal: true

rtttl:
  speaker: spk
  on_finished_playback:
    # Solange ein Timer-Alarm aktiv ist, Tonfolge wiederholen (mit kurzer Pause)
    - delay: 400ms
    - if:
        condition: { lambda: 'return id(g_alarm);' }
        then:
          - script.execute: play_tone

touchscreen:
  platform: cst816
  id: my_touch
  interrupt_pin: GPIO7
  reset_pin: GPIO8
  display: main_display
  on_touch:
    # Startpunkt einmal merken (on_touch feuert nur beim ersten Antippen)
    - lambda: |-
        id(g_x0) = touch.x; id(g_y0) = touch.y;
        id(g_xl) = touch.x; id(g_yl) = touch.y;
        if (id(g_disp_off)) { id(g_was_off) = true; id(wake_display).execute(); }
        else { id(g_was_off) = false; id(idle_timer).execute(); }
  on_update:
    # Während des Wischens die aktuelle Fingerposition mitschreiben
    - lambda: |-
        if (!touches.empty()) { id(g_xl) = touches[0].x; id(g_yl) = touches[0].y; }
  on_release:
    - lambda: |-
        id(idle_timer).execute();
        // Klingelt ein Timer-Alarm? Jede Berührung quittiert ihn (sonst keine Aktion)
        if (id(g_alarm)) { id(g_was_off) = false; id(dismiss_alarm).execute(); return; }
        // War das Display aus, war diese Berührung nur zum Wecken -> keine Aktion
        if (id(g_was_off)) { id(g_was_off) = false; return; }
        int dx = id(g_xl) - id(g_x0);
        int dy = id(g_yl) - id(g_y0);
        const int order[10] = ${tile_order};
          int t = order[id(g_tile)];
        // Im Farbmenü: jede vertikale Wischgeste = zurück; sonst nichts
        if (id(g_submode) == 1) {
          if (abs(dy) > 50 && abs(dy) > abs(dx)) id(exit_color).execute();
          return;
        }
        // In der Timer-Liste: jede vertikale Wischgeste = zurück
        if (id(g_submode) == 2) {
          if (abs(dy) > 50 && abs(dy) > abs(dx)) id(exit_timers).execute();
          return;
        }
        // Flug-Detail-Overlay: nach oben wischen schließt
        if (id(g_submode) == 3) {
          if (abs(dy) > 50 && abs(dy) > abs(dx)) id(close_details).execute();
          return;
        }
        if (abs(dx) > 50 && abs(dx) > abs(dy)) {
          // Horizontal wischen -> Kachel wechseln (9 Kacheln)
          if (dx < 0) id(g_tile) = (id(g_tile) + 1) % 10;
          else        id(g_tile) = (id(g_tile) + 9) % 10;
          id(nav_update).execute();
        } else if (abs(dy) > 50 && abs(dy) > abs(dx)) {
          // Vertikal wischen: hoch -> aktive Timer; runter auf Einzel-Lampe (3..5) -> Farbmenü
          if (dy < 0) id(enter_timers).execute();
          else if (t >= 3 && t <= 5) id(enter_color).execute();
        } else if (abs(dx) < 25 && abs(dy) < 25) {
          // Tippen
          if (t == 9) {
            id(radar_tap).execute();               // Flugradar: Flieger wählen -> Details
          } else {
            // ABER nicht wenn auf dem Aktions-Button (eigener on_click). Mitte ~ (180, 260).
            bool btn_shown = (t == 0 || (t >= 3 && t <= 5));
            bool on_btn = btn_shown && abs(id(g_xl) - 180) <= 40 && abs(id(g_yl) - 260) <= 40;
            if (!on_btn) id(tap_action).execute();
          }
        }

# Knob: KEIN Quadratur-Encoder. Richtung = welcher Pin pulst.
#   links  -> GPIO2 (Wert runter)   rechts -> GPIO1 (Wert hoch)
binary_sensor:
  - platform: gpio
    name: "Knob links"
    internal: true
    pin: { number: GPIO2, inverted: true, mode: { input: true, pullup: true } }
    on_press:
      - lambda: |-
          if (id(g_disp_off)) { id(wake_display).execute(); }
          else { id(idle_timer).execute(); id(knob_step).execute(-10); }
  - platform: gpio
    name: "Knob rechts"
    internal: true
    pin: { number: GPIO1, inverted: true, mode: { input: true, pullup: true } }
    on_press:
      - lambda: |-
          if (id(g_disp_off)) { id(wake_display).execute(); }
          else { id(idle_timer).execute(); id(knob_step).execute(10); }

###############################################################################
# GLOBALS
###############################################################################
globals:
  # Kacheln: 0=Ventilator 1=Storen 2=Licht(alle) 3=Gradient 4=Lightstrip 5=Stehlampe
  - { id: g_tile,    type: int,  restore_value: no, initial_value: '0' }
  - { id: g_pressed, type: bool, restore_value: no, initial_value: 'false' }
  - { id: g_x0, type: int, restore_value: no, initial_value: '0' }
  - { id: g_y0, type: int, restore_value: no, initial_value: '0' }
  - { id: g_xl, type: int, restore_value: no, initial_value: '0' }
  - { id: g_yl, type: int, restore_value: no, initial_value: '0' }
  - { id: g_fan_speed, type: int, restore_value: yes, initial_value: '0' }  # 0=Stop, 1..6 (Ist-Wert aus input_number)
  - { id: g_fan_clicks, type: int, restore_value: no, initial_value: '0' }  # Klick-Akkumulator (4 Klicks = 1 Stufe)
  - { id: g_cover_pos,type: int,  restore_value: no, initial_value: '0' }   # 0=zu 100=offen
  # Licht: Ist-Zustand der 3 Lampen (Index 0=Gradient 1=Lightstrip 2=Stehlampe)
  - id: g_li_on
    type: bool[3]
    restore_value: no
    initial_value: '{false, false, false}'
  - id: g_li_pct
    type: int[3]
    restore_value: no
    initial_value: '{0, 0, 0}'
  - { id: g_all_pct, type: float, restore_value: no, initial_value: '50' }  # absolute Master-Helligkeit "Licht alle" (10..100)
  - { id: g_light_lock, type: uint32_t, restore_value: no, initial_value: '0' }  # millis: bis dahin HA-Helligkeit ignorieren (Anti-Hinken)
  # Flugradar (g_planes ist ein inline-Global in flight.h, kein ESPHome-Global)
  - { id: g_radius_km, type: float, restore_value: no, initial_value: '10' }     # Radar-Radius 10..50 km
  - { id: g_color_idx, type: int, restore_value: no, initial_value: '0' }   # aktuelles Farb-Preset
  - { id: g_set_pct, type: int, restore_value: no, initial_value: '0' }     # Scratch: Helligkeit für act_light_bri
  - { id: g_ltarget, type: std::string, restore_value: no, initial_value: '""' }  # Ziel-Entity(s) der aktiven Licht-Kachel
  # Farbmenü (Unterseite auf Licht-Kacheln)
  - { id: g_submode, type: int, restore_value: no, initial_value: '0' }  # 0=Kachel, 1=Farbmenü
  - { id: g_hue, type: int, restore_value: no, initial_value: '0' }      # 0..359 Farbton
  - { id: g_cr, type: int, restore_value: no, initial_value: '255' }     # aus Hue berechnetes RGB
  - { id: g_cg, type: int, restore_value: no, initial_value: '0' }
  - { id: g_cb, type: int, restore_value: no, initial_value: '0' }
  - { id: g_tv_state, type: int, restore_value: no, initial_value: '0' }  # media_player: 0=Aus 1=Läuft 2=Pause/wach
  - { id: g_charging, type: bool,  restore_value: no, initial_value: 'false' }  # Akku lädt (Heuristik)
  - { id: g_bat_prev, type: float, restore_value: no, initial_value: '0' }      # letzte Akku-Spannung (Trend)
  - { id: g_bright,   type: float, restore_value: yes, initial_value: '100' }   # Display-Helligkeit % (10..100), 48 Klicks = voller Bereich
  # Display-Sleep
  - { id: g_disp_off, type: bool, restore_value: no, initial_value: 'false' }  # Backlight aus (idle)
  - { id: g_was_off,  type: bool, restore_value: no, initial_value: 'false' }  # diese Berührung war nur Wecken
  # Timer
  - { id: g_timer_set, type: int, restore_value: no, initial_value: '5' }      # eingestellte Minuten (0..180)
  - { id: g_tone_idx,  type: int, restore_value: yes, initial_value: '0' }     # 0..2 gewählte Tonfolge
  - { id: g_tmr_sel,     type: int,  restore_value: no, initial_value: '0' }      # ausgewählter Timer-Slot (Scroll)
  - { id: g_add_mode,    type: bool, restore_value: no, initial_value: 'false' }  # Timer-Kachel: + aktiv -> Wheel stellt Zeit
  - { id: g_alarm,       type: bool, restore_value: no, initial_value: 'false' }  # Timer abgelaufen, klingelt
  - { id: g_alarm_color, type: int,  restore_value: no, initial_value: '0' }     # 0=rot 1=grün 2=blau (Slot)
  - { id: g_blink_on,    type: bool, restore_value: no, initial_value: 'false' }  # Blink-Toggle
  - id: g_tmr
    type: int[5]
    restore_value: no
    initial_value: '{0, 0, 0, 0, 0}'  # Restsekunden je Timer-Slot (0=frei); Farben: 0 rot 1 orange 2 gelb 3 grün 4 blau

###############################################################################
# HA-STATE  ->  GLOBALS  (jede Änderung rendert neu)
###############################################################################
text_sensor:
  - platform: homeassistant
    id: ha_l1_state
    entity_id: ${light1_entity}
    on_value:
      - lambda: 'id(g_li_on)[0] = (x == "on"); id(render).execute();'
  - platform: homeassistant
    id: ha_l2_state
    entity_id: ${light2_entity}
    on_value:
      - lambda: 'id(g_li_on)[1] = (x == "on"); id(render).execute();'
  - platform: homeassistant
    id: ha_l3_state
    entity_id: ${light3_entity}
    on_value:
      - lambda: 'id(g_li_on)[2] = (x == "on"); id(render).execute();'
  - platform: homeassistant
    id: ha_tv_state
    entity_id: ${tv_media_entity}
    on_value:
      - lambda: |-
          // Dieses Gerät meldet beim Pausieren "idle" (nicht "paused").
          if (x == "playing") id(g_tv_state) = 1;                          // Läuft
          else if (x == "paused" || x == "idle" || x == "on" || x == "buffering") id(g_tv_state) = 2;  // Pause/wach
          else id(g_tv_state) = 0;                                          // standby/off/unavailable = Aus
          id(render).execute();

sensor:
  - platform: homeassistant
    id: ha_fan_speed
    entity_id: ${fan_speed_entity}        # Ist-Stufe 0..6 (von den RF-Scripts gesetzt)
    on_value:
      - lambda: 'id(g_fan_speed) = isnan(x) ? 0 : (int)(x + 0.5f); id(g_fan_clicks) = 0; id(render).execute();'
  - platform: homeassistant
    id: ha_cover_pos
    entity_id: ${cover_entity}
    attribute: current_position
    on_value:
      - lambda: 'id(g_cover_pos) = isnan(x) ? 0 : (int) x; id(render).execute();'
  - platform: homeassistant
    id: ha_l1_bri
    entity_id: ${light1_entity}
    attribute: brightness          # 0..255
    on_value:
      - lambda: 'if (millis() < id(g_light_lock)) return; id(g_li_pct)[0] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'
  - platform: homeassistant
    id: ha_l2_bri
    entity_id: ${light2_entity}
    attribute: brightness
    on_value:
      - lambda: 'if (millis() < id(g_light_lock)) return; id(g_li_pct)[1] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'
  - platform: homeassistant
    id: ha_l3_bri
    entity_id: ${light3_entity}
    attribute: brightness
    on_value:
      - lambda: 'if (millis() < id(g_light_lock)) return; id(g_li_pct)[2] = isnan(x) ? 0 : (int)(x / 255.0f * 100.0f + 0.5f); id(render).execute();'
  # --- System-Info (Kachel 7) ---
  - platform: debug
    free:
      id: sys_free          # freier Heap (Bytes)
    loop_time:
      id: sys_loop          # max. Loop-Zeit (ms) als Last-Indikator
  - platform: adc           # Akku am Board-ADC GPIO6 (~10k/10k -> x2)
    pin: GPIO6
    id: bat_volt
    attenuation: 12db
    update_interval: 10s
    samples: 64
    filters:
      - multiply: 2.0
      - exponential_moving_average: { alpha: 0.2, send_every: 1 }
    on_value:
      # Kein Lade-Status-Pin -> Heuristik: Spannung steigt oder >=4.13V = lädt
      - lambda: |-
          if (x >= 4.13f) {
            id(g_charging) = true;
          } else if (id(g_bat_prev) > 0.5f) {       // erster Messwert nur merken
            if      (x >= id(g_bat_prev) + 0.008f) id(g_charging) = true;
            else if (x <= id(g_bat_prev) - 0.008f) id(g_charging) = false;
          }
          id(g_bat_prev) = x;
          { const int o[10] = ${tile_order}; if (o[id(g_tile)] == 7) id(render).execute(); }

###############################################################################
# DISPLAY  (ST77916 QSPI, 360x360, RGB565, Farben invertiert)
###############################################################################
display:
  - platform: qspi_dbi
    model: CUSTOM
    data_rate: 80MHz
    id: main_display
    spi_id: display_qspi
    color_order: rgb
    invert_colors: true
    dimensions: { height: 360, width: 360 }
    cs_pin: 12
    reset_pin: GPIO17
    init_sequence:
      - [ 0xF0, 0x28 ]
      - [ 0xF2, 0x28 ]
      - [ 0x73, 0xF0 ]
      - [ 0x7C, 0xD1 ]
      - [ 0x83, 0xE0 ]
      - [ 0x84, 0x61 ]
      - [ 0xF2, 0x82 ]
      - [ 0xF0, 0x00 ]
      - [ 0xF0, 0x01 ]
      - [ 0xF1, 0x01 ]
      - [ 0xB0, 0x56 ]
      - [ 0xB1, 0x4D ]
      - [ 0xB2, 0x24 ]
      - [ 0xB4, 0x87 ]
      - [ 0xB5, 0x44 ]
      - [ 0xB6, 0x8B ]
      - [ 0xB7, 0x40 ]
      - [ 0xB8, 0x86 ]
      - [ 0xBA, 0x00 ]
      - [ 0xBB, 0x08 ]
      - [ 0xBC, 0x08 ]
      - [ 0xBD, 0x00 ]
      - [ 0xC0, 0x80 ]
      - [ 0xC1, 0x10 ]
      - [ 0xC2, 0x37 ]
      - [ 0xC3, 0x80 ]
